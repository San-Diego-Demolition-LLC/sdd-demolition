<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--gold:#B8922A;--gold-light:#C9A84C;--gold-dim:rgba(184,146,42,0.12);--gold-dim2:rgba(184,146,42,0.07);--surface:#FFFFFF;--surface2:#F5F4F1;--surface3:#ECEAE5;--border:rgba(0,0,0,0.08);--border2:rgba(0,0,0,0.14);--text:#1A1A1A;--muted:#777;--muted2:#AAA;--danger:#D94F4F;--success:#3A9E6A;--warning:#C8822A;--info:#3A7ED4;--purple:#7C5CBF;}
body{background:#F0EEE9;color:var(--text);font-family:'Barlow',sans-serif;font-size:14px;min-height:100vh;display:flex;flex-direction:column;}
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;position:sticky;top:0;z-index:100;}
.logo{display:flex;align-items:center;gap:12px;}
.logo-svg .s-bar{fill:var(--gold);}.logo-svg .letters{fill:#1A1A1A;}
.logo-text{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:600;letter-spacing:.12em;color:var(--muted);text-transform:uppercase;}
.nav{display:flex;gap:4px;}
.nav-item{padding:6px 14px;border-radius:6px;font-size:14px;color:var(--muted);cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:7px;text-decoration:none;}
.nav-item:hover{background:var(--surface2);color:var(--text);}
.nav-item.active{background:var(--gold-dim);color:var(--gold);}
.nav-item svg{width:15px;height:15px;opacity:.7;}
.btn{padding:8px 18px;border-radius:6px;font-size:14px;font-family:'Barlow',sans-serif;cursor:pointer;transition:all .15s;border:none;display:inline-flex;align-items:center;gap:6px;}
.btn-gold{background:var(--gold);color:#fff;font-weight:600;}
.btn-gold:hover{background:var(--gold-light);}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border2);}
.btn-ghost:hover{background:var(--surface2);color:var(--text);}
.btn-sm{padding:5px 13px;font-size:13px;}
.app{display:flex;flex:1;overflow:hidden;height:calc(100vh - 112px);}
.view-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 24px;display:flex;align-items:center;gap:8px;flex-shrink:0;}
.view-toggle{display:flex;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:3px;gap:2px;}
/* Sub-tabs stacked vertically (full width) under the main group tabs */
.co-subtabs-vertical{flex-direction:column;align-items:stretch;gap:3px;width:100%;max-width:280px;}
.co-subtabs-vertical .vt-btn{text-align:left;width:100%;padding:9px 14px;}
#co-subbar{align-items:flex-start;}
.vt-btn{padding:5px 16px;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;border:none;background:transparent;color:var(--muted);font-family:'Barlow',sans-serif;transition:all .15s;white-space:nowrap;}
.vt-btn.active{background:var(--surface);color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,.1);}
.panel-left{width:300px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;transition:all .2s;}
.search-box{margin:12px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:8px 12px;display:flex;align-items:center;gap:8px;}
.search-box input{background:none;border:none;outline:none;color:var(--text);font-family:'Barlow',sans-serif;font-size:14px;flex:1;}
.search-box input::placeholder{color:var(--muted2);}
.left-list{flex:1;overflow-y:auto;}
.left-list::-webkit-scrollbar{width:4px;}
.left-list::-webkit-scrollbar-thumb{background:var(--surface3);border-radius:2px;}
.list-item{padding:13px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .12s;}
.list-item:hover{background:var(--surface2);}
.list-item.active{background:var(--gold-dim2);border-left:3px solid var(--gold);}
.li-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:3px;}
.li-name{font-size:14px;font-weight:600;}
.li-amt{font-size:14px;font-weight:700;color:var(--danger);}
.li-sub{font-size:12px;color:var(--muted);}
.panel-right{flex:1;overflow-y:auto;background:#F0EEE9;}
.panel-right::-webkit-scrollbar{width:6px;}
.panel-right::-webkit-scrollbar-thumb{background:var(--surface3);border-radius:3px;}
.empty-state{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;color:var(--muted);}
.empty-state svg{width:40px;height:40px;opacity:.25;}
.detail-wrap{padding:20px 24px;}
.card{background:var(--surface);border-radius:12px;padding:18px 20px;margin-bottom:14px;}
.card-title{font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;}
.pill{font-size:11px;padding:3px 9px;border-radius:20px;font-weight:600;}
.pill-paid{background:rgba(58,158,106,.12);color:var(--success);}
.pill-unpaid{background:rgba(217,79,79,.1);color:var(--danger);}
.pill-partial{background:rgba(200,130,42,.12);color:var(--warning);}
table{width:100%;border-collapse:collapse;font-size:13px;}
th{text-align:left;color:var(--muted);font-weight:600;font-size:11px;letter-spacing:.04em;padding:7px 10px;border-bottom:1px solid var(--border);}
td{padding:10px 10px;border-bottom:1px solid var(--border);vertical-align:middle;}

<style>
.co-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px 20px;margin-bottom:16px;}
.co-card h3{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:700;margin:0 0 12px;}
.co-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.ff{display:flex;flex-direction:column;gap:4px;margin-bottom:10px;}
.ff label{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;}
.ff input,.ff select,.ff textarea{padding:9px 11px;border:1.5px solid var(--border2);border-radius:8px;font-family:'Barlow',sans-serif;font-size:14px;outline:none;background:#fff;}
.co-table{width:100%;border-collapse:collapse;}
.co-table th{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);padding:9px 10px;text-align:left;border-bottom:1px solid var(--border);}
.co-table td{font-size:13px;padding:10px;border-bottom:1px solid var(--border);vertical-align:middle;}
.pill{font-size:11px;font-weight:700;padding:2px 9px;border-radius:20px;}
.doc-ok{background:rgba(58,158,106,.12);color:var(--success);}
.doc-soon{background:rgba(200,130,42,.14);color:var(--warning);}
.doc-exp{background:rgba(217,79,79,.12);color:var(--danger);}
.role-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;text-transform:uppercase;}
.r-admin{background:rgba(124,92,191,.14);color:var(--purple);}
.r-manager{background:rgba(58,126,212,.14);color:var(--info);}
.r-driver{background:rgba(184,146,42,.14);color:var(--gold);}
.co-btn{padding:7px 14px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:1.5px solid var(--border2);background:#fff;color:var(--text);font-family:'Barlow',sans-serif;}
.co-btn-gold{background:var(--gold);color:#fff;border-color:var(--gold);}
.co-btn-sm{padding:4px 10px;font-size:12px;}
.veh-doc-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--border);}
</style>

function coParseD(d){ var t=Date.parse(d||''); return isNaN(t)?null:new Date(t); }
function coDocStatus(expires){
  var d=coParseD(expires); if(!d) return {cls:'doc-ok',label:'—'};
  var days=Math.round((d-TODAY_CO)/86400000);
  if(days<0) return {cls:'doc-exp',label:'Expired'};

  return {cls:'doc-ok',label:'Valid'};
}

var CO_GROUPS={
  company:    { label:'My Company', tabs:[
                  {id:'settings', label:'Company Settings'},

                  {id:'coa',      label:'Chart of Accounts'} ] },
  reports:    { label:'Reports', tabs:[

                  {id:'balance',  label:'Balance Sheet'},

  compliance: { label:'Compliance', tabs:[
                  {id:'compliance', label:'Compliance Documents'},
                  {id:'fleet',      label:'Fleet'} ] }
};
// Which group a given tab belongs to
function _coGroupOf(tab){
  for(var g in CO_GROUPS){ if(CO_GROUPS[g].tabs.some(function(t){return t.id===tab;})) return g; }
  return 'company';
}
var _coActiveTab='settings';

// Click a main tab → highlight it, rebuild its sub-tabs, open its first sub-tab
function coShowGroup(group){
  ['company','reports','compliance'].forEach(function(g){
    var b=document.getElementById('grp-'+g); if(b) b.classList.toggle('active', g===group);
  });
  var grp=CO_GROUPS[group]; if(!grp) return;
  var sub=document.getElementById('co-subtabs');
  if(sub){
    sub.innerHTML=grp.tabs.map(function(t){
      return '<button class="vt-btn" id="subtab-'+t.id+'" onclick="coShow(\''+t.id+'\')">'+t.label+'</button>';
    }).join('');
  }
  // If the currently active tab is inside this group keep it, else open first
  var stay=grp.tabs.some(function(t){return t.id===_coActiveTab;});
  coShow(stay?_coActiveTab:grp.tabs[0].id);
}

// ===== Tab switching =====
function coShow(tab){
  _coActiveTab=tab;
  var group=_coGroupOf(tab);
  // keep the main-tab highlight in sync (e.g. when called directly)
  ['company','reports','compliance'].forEach(function(g){
    var b=document.getElementById('grp-'+g); if(b) b.classList.toggle('active', g===group);
  });
  // rebuild sub-tabs if they don't match the group
  var sub=document.getElementById('co-subtabs');
  if(sub && !document.getElementById('subtab-'+tab)){
    sub.innerHTML=CO_GROUPS[group].tabs.map(function(t){
      return '<button class="vt-btn" id="subtab-'+t.id+'" onclick="coShow(\''+t.id+'\')">'+t.label+'</button>';
    }).join('');
  }
  // highlight active sub-tab
  CO_GROUPS[group].tabs.forEach(function(t){
    var b=document.getElementById('subtab-'+t.id); if(b) b.classList.toggle('active', t.id===tab);
  });
  var el=document.getElementById('co-content');
  if(tab==='settings') el.innerHTML=renderSettings();
  else if(tab==='coa') el.innerHTML=renderCOA();
  else if(tab==='reports') el.innerHTML=renderReports();
  else if(tab==='ledger') el.innerHTML=renderLedger();
  else if(tab==='pnl') el.innerHTML=renderPnL();
  else if(tab==='balance') el.innerHTML=renderBalanceSheet();
  else if(tab==='cashflow') el.innerHTML=renderCashFlow();
  else if(tab==='users') el.innerHTML=renderUsers();
  else if(tab==='fleet') el.innerHTML=renderFleet();
  else if(tab==='compliance') el.innerHTML=renderCompliance();
}

// ===== REPORTS: transactions per account =====
var _rptSort='date-desc';
var _rptFrom='';
var _rptTo='';
function renderReports(){
  var opts=ACCOUNTS.filter(function(a){return a.level===1;}).map(function(a){return '<option value="'+a.id+'">'+a.name+'</option>';}).join('');
  return '<div class="co-card"><h3>Account Reports</h3>'
    +'<div style="display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap;margin-bottom:12px;">'
      +'<div class="ff" style="flex:1;min-width:200px;margin:0;"><label>Account</label><select id="rptAcct" onchange="coRunReport()">'+opts+'</select></div>'
      +'<div class="ff" style="margin:0;"><label>Sort by</label><select id="rptSort" onchange="_rptSort=this.value;coRunReport()">'
        +'<option value="date-desc">Date (newest)</option>'
        +'<option value="date-asc">Date (oldest)</option>'
        +'<option value="ref-asc">Ref (A→Z)</option>'
        +'<option value="ref-desc">Ref (Z→A)</option>'
        +'<option value="desc-asc">Description (A→Z)</option>'
        +'<option value="desc-desc">Description (Z→A)</option>'
        +'<option value="amt-desc">Amount (high→low)</option>'
        +'<option value="amt-asc">Amount (low→high)</option>'
      +'</select></div>'
      +'<button class="co-btn co-btn-gold" onclick="coRunReport()">Run Report</button>'
    +'</div>'
    +'<div style="display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap;margin-bottom:12px;background:var(--surface2);padding:10px 12px;border-radius:8px;">'
      +'<span style="font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;align-self:center;">Date range</span>'
      +'<div class="ff" style="margin:0;"><label>From</label><input type="date" id="rptFrom" onchange="_rptFrom=this.value;coRunReport()"></div>'
      +'<div class="ff" style="margin:0;"><label>To</label><input type="date" id="rptTo" onchange="_rptTo=this.value;coRunReport()"></div>'
      +'<button class="co-btn co-btn-sm" onclick="_rptFrom=\'\';_rptTo=\'\';document.getElementById(\'rptFrom\').value=\'\';document.getElementById(\'rptTo\').value=\'\';coRunReport()">Clear Dates</button>'
    +'</div>'
    +'<div id="rptOut"><div style="padding:20px;text-align:center;color:var(--muted2);font-style:italic;">Select an account and run the report.</div></div>'
  +'</div>';
}
function coRunReport(){
  var sel=document.getElementById('rptAcct'); if(!sel) return;
  var acctId=sel.value; var acctName=coAcctName(acctId);
  var tx=coCollectTxForAccount(acctId, acctName);
  // Date-range filter
  if(_rptFrom){ var fT=Date.parse(_rptFrom); if(!isNaN(fT)) tx=tx.filter(function(t){ var d=Date.parse(t.date); return isNaN(d)||d>=fT; }); }
  if(_rptTo){ var tT=Date.parse(_rptTo); if(!isNaN(tT)){ tT+=86400000-1; tx=tx.filter(function(t){ var d=Date.parse(t.date); return isNaN(d)||d<=tT; }); } }
  // Sorting
  tx.sort(function(a,b){
    switch(_rptSort){
      case 'date-asc': return (Date.parse(a.date)||0)-(Date.parse(b.date)||0);
      case 'date-desc': return (Date.parse(b.date)||0)-(Date.parse(a.date)||0);
      case 'ref-asc': return String(a.ref).localeCompare(String(b.ref));
      case 'ref-desc': return String(b.ref).localeCompare(String(a.ref));
      case 'desc-asc': return String(a.desc).localeCompare(String(b.desc));
      case 'desc-desc': return String(b.desc).localeCompare(String(a.desc));
      case 'amt-desc': return b.amount-a.amount;
      case 'amt-asc': return a.amount-b.amount;
      default: return 0;
    }
  });
  var out=document.getElementById('rptOut');
  if(!tx.length){ out.innerHTML='<div style="padding:18px;text-align:center;color:var(--muted2);font-style:italic;">No transactions found for '+acctName+(_rptFrom||_rptTo?' in this date range':'')+'.</div>'; return; }
  // Running balance: compute chronologically (oldest→newest), then attach to each tx
  var chrono=tx.slice().sort(function(a,b){ return (Date.parse(a.date)||0)-(Date.parse(b.date)||0); });
  var run=0;
  chrono.forEach(function(t){ run+=t.amount; t._balance=run; });
  var total=run; // final running balance = account balance
  // Clickable sortable headers too
  function thSort(label,key){ return '<th style="cursor:pointer;" onclick="coSortBy(\''+key+'\')">'+label+' ⇅</th>'; }
  var rows=tx.map(function(t){ return '<tr><td>'+t.date+'</td><td>'+t.ref+'</td><td>'+t.desc+'</td>'
    +'<td style="text-align:right;font-weight:700;color:'+(t.amount<0?'var(--danger)':'var(--success)')+';">'+coMoney(t.amount)+'</td>'
    +'<td style="text-align:right;font-weight:600;color:var(--muted);">'+coMoney(t._balance)+'</td></tr>'; }).join('');
  out.innerHTML='<div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;margin-bottom:10px;">'
      +'<div style="font-size:13px;color:var(--muted);">Showing '+tx.length+' transaction'+(tx.length!==1?'s':'')+' for <strong>'+acctName+'</strong>'+(_rptFrom||_rptTo?(' · '+(_rptFrom||'…')+' to '+(_rptTo||'…')):'')+'</div>'
      +'<div style="font-size:13px;color:var(--muted);">Account balance: <strong style="font-size:16px;color:'+(total<0?'var(--danger)':'var(--success)')+';">'+coMoney(total)+'</strong></div>'
    +'</div>'
    +'<table class="co-table"><tr>'+thSort('Date','date')+thSort('Ref','ref')+thSort('Description','desc')
      +'<th style="text-align:right;cursor:pointer;" onclick="coSortBy(\'amt\')">Amount ⇅</th>'
      +'<th style="text-align:right;">Balance</th></tr>'+rows
    +'<tr style="background:var(--surface2);"><td colspan="3" style="font-weight:700;">Total · '+tx.length+' transactions</td>'
      +'<td style="text-align:right;font-weight:800;">'+coMoney(tx.reduce(function(s,t){return s+t.amount;},0))+'</td>'
      +'<td style="text-align:right;font-weight:800;">'+coMoney(total)+'</td></tr></table>';
}
// Toggle sort direction when clicking a column header
function coSortBy(key){
  var asc=key+'-asc', desc=key+'-desc';
  _rptSort=(_rptSort===desc)?asc:desc;
  var s=document.getElementById('rptSort'); if(s) s.value=_rptSort;
  coRunReport();
}
function coMoney(n){ var s=(n<0?'-':'')+'$'+Math.abs(Math.round(n)).toLocaleString('en-US'); return s; }
function coCollectTxForAccount(acctId, acctName){
  // Pull real postings from the General Ledger (double-entry) for this account.
  if(window.SDD && window.SDD.ledgerForAccount){
    var rows=window.SDD.ledgerForAccount(acctId);
    return rows.map(function(r){ return {date:r.date, ref:r.ref, desc:r.desc, amount:r.amount, source:r.source}; });
  }
  return [];
}

function renderLedger(){
  var entries=(window.SDD && window.SDD.ledger) ? window.SDD.ledger() : [];
  // newest first by date
  entries=entries.slice().sort(function(a,b){ return (Date.parse(b.date)||0)-(Date.parse(a.date)||0); });
  var srcBadge={invoice:'#3A7ED4',payment:'#3A9E6A','bill':'#C8822A','bill-payment':'#D94F4F',manual:'#7C5CBF'};
  var rows=entries.map(function(e){
    var lines=(e.lines||[]).map(function(ln){
      var nm=coAcctName(ln.account);
      var dr=ln.debit?coMoney(ln.debit):'';
      var cr=ln.credit?coMoney(ln.credit):'';
      return '<tr><td style="padding-left:30px;color:var(--muted);font-size:12px;">'+nm+'</td>'

        +' <span style="font-size:10px;font-weight:700;padding:1px 7px;border-radius:10px;background:'+col+'22;color:'+col+';margin-left:6px;">'+(e.source||'').toUpperCase()+'</span></td>'
      +'<td colspan="2" style="color:var(--muted);font-size:12px;">'+(e.memo||'')+'</td>'

  }).join('');
  // totals
  var totD=0,totC=0; entries.forEach(function(e){ (e.lines||[]).forEach(function(l){ totD+=(l.debit||0); totC+=(l.credit||0); }); });
  return '<div class="co-card"><h3>General Ledger '
      +'<button class="co-btn co-btn-gold co-btn-sm" style="float:right;" onclick="coOpenManualEntry()">+ Journal Entry</button></h3>'
    +'<div style="font-size:12px;color:var(--muted);margin-bottom:10px;">Every invoice, bill and payment posts here automatically as a double-entry. You can also add manual journal entries.</div>'
    +'<table class="co-table"><tr><th>Entry / Account</th><th style="text-align:right;">Debit</th><th style="text-align:right;">Credit</th><th></th></tr>'+rows
    +'<tr style="border-top:2px solid var(--border2);"><td style="font-weight:800;">TOTALS · '+entries.length+' entries</td>'
      +'<td style="text-align:right;font-weight:800;">'+coMoney(totD)+'</td>'
      +'<td style="text-align:right;font-weight:800;">'+coMoney(totC)+'</td><td></td></tr>'
    +'</table>'
    +'<div style="font-size:12px;color:'+(Math.abs(totD-totC)<0.01?'var(--success)':'var(--danger)')+';margin-top:8px;font-weight:700;">'
      +(Math.abs(totD-totC)<0.01?'✓ Books are balanced (debits = credits)':'⚠ Out of balance by '+coMoney(Math.abs(totD-totC)))+'</div>'
  +'</div>';
}

function coJEDelLine(i){ window._coJELines.splice(i,1); if(!window._coJELines.length) window._coJELines.push({account:'',debit:'',credit:''}); coJERenderLines(); }
function coJEUpdateBalance(){
  var el=document.getElementById('_coJEBalance'); if(!el) return;

  el.innerHTML='Debits: '+coMoney(d)+' · Credits: '+coMoney(c)+' — '+(d===0&&c===0?'<span style="color:var(--muted);">enter amounts</span>':(bal?'<span style="color:var(--success);">✓ balanced</span>':'<span style="color:var(--danger);">✗ not balanced</span>'));
}
function coJESave(){

// ===== FINANCIAL STATEMENTS =====
function _fsRow(name, amount, opts){
  opts=opts||{};
  var ind=opts.indent?'padding-left:'+(opts.indent*18+10)+'px;':'';
  var bold=opts.bold?'font-weight:800;':(opts.semi?'font-weight:700;':'');
  var border=opts.topBorder?'border-top:2px solid var(--border2);':'';
  var col=opts.color||'';
  var size=opts.big?'font-size:15px;':'';
  return '<tr style="'+border+'"><td style="'+ind+bold+size+'">'+name+'</td>'
    +'<td style="text-align:right;'+bold+size+(col?'color:'+col+';':'')+'">'+(amount==null?'':coMoney(amount))+'</td></tr>';
}
function renderPnL(){
  if(!(window.SDD && window.SDD.summaryByTypes)) return '<div class="co-card">Ledger not available.</div>';
  var income=window.SDD.summaryByTypes(/^Income$/);
  var otherInc=window.SDD.summaryByTypes(/Other Income/);
  var cogs=window.SDD.summaryByTypes(/Cost of Goods Sold/);
  var exp=window.SDD.summaryByTypes(/^Expense$/);
  var otherExp=window.SDD.summaryByTypes(/Other Expense/);
  var grossProfit=income.total - cogs.total;
  var netOrdinary=grossProfit - exp.total;
  var netIncome=netOrdinary + otherInc.total - otherExp.total;
  function section(title, data){
    if(!data.accounts.length) return _fsRow('<em style="color:var(--muted2);">No '+title.toLowerCase()+'</em>', null);
    return data.accounts.map(function(a){ return _fsRow(a.name, a.balance, {indent:1}); }).join('');
  }
  var rows=''
    +'<tr><td colspan="2" style="font-weight:800;padding-top:6px;color:var(--success);">Income</td></tr>'
    +section('Income', income)
    +_fsRow('Total Income', income.total, {semi:true, topBorder:true})
    +'<tr><td colspan="2" style="font-weight:800;padding-top:12px;color:var(--warning);">Cost of Goods Sold</td></tr>'
    +section('COGS', cogs)
    +_fsRow('Total COGS', cogs.total, {semi:true, topBorder:true})

function renderBalanceSheet(){
  if(!(window.SDD && window.SDD.summaryByTypes)) return '<div class="co-card">Ledger not available.</div>';
  var bank=window.SDD.summaryByTypes(/^Bank$/);
  var ar=window.SDD.summaryByTypes(/Accounts Receivable$/);
  var oca=window.SDD.summaryByTypes(/Other Current Asset/);
  var fa=window.SDD.summaryByTypes(/Fixed Asset/);
  var totalAssets=bank.total+ar.total+oca.total+fa.total;
  var ap=window.SDD.summaryByTypes(/Accounts Payable$/);
  var ocl=window.SDD.summaryByTypes(/Other Current Liability/);
  var cc=window.SDD.summaryByTypes(/Credit Card/);
  var ltl=window.SDD.summaryByTypes(/Long Term Liability/);
  var totalLiab=ap.total+ocl.total+cc.total+ltl.total;
  var eq=window.SDD.summaryByTypes(/^Equity$/);
  // Net income flows into equity (retained earnings)
  var income=window.SDD.summaryByTypes(/^Income$/);
  var cogs=window.SDD.summaryByTypes(/Cost of Goods Sold/);
  var exp=window.SDD.summaryByTypes(/^Expense$/);
  var oi=window.SDD.summaryByTypes(/Other Income/);
  var oe=window.SDD.summaryByTypes(/Other Expense/);
  var netIncome=income.total-cogs.total-exp.total+oi.total-oe.total;
  var totalEquity=eq.total+netIncome;
  function grp(title, data){
    if(!data.accounts.length) return '';
    return data.accounts.map(function(a){ return _fsRow(a.name, a.balance, {indent:1}); }).join('');
  }
  var rows=''
    +'<tr><td colspan="2" style="font-weight:800;color:var(--info);">ASSETS</td></tr>'
    +grp('Bank',bank)+grp('AR',ar)+grp('OCA',oca)+grp('FA',fa)
    +_fsRow('Total Assets', totalAssets, {bold:true, big:true, topBorder:true, color:'var(--info)'})
    +'<tr><td colspan="2" style="font-weight:800;padding-top:14px;color:var(--danger);">LIABILITIES</td></tr>'
    +grp('AP',ap)+grp('OCL',ocl)+grp('CC',cc)+grp('LTL',ltl)
    +_fsRow('Total Liabilities', totalLiab, {semi:true, topBorder:true})
    +'<tr><td colspan="2" style="font-weight:800;padding-top:14px;color:var(--purple);">EQUITY</td></tr>'
    +grp('Equity',eq)
    +_fsRow('Net Income (current)', netIncome, {indent:1})
    +_fsRow('Total Equity', totalEquity, {semi:true, topBorder:true})
    +_fsRow('Total Liabilities + Equity', totalLiab+totalEquity, {bold:true, big:true, topBorder:true, color:'var(--purple)'});
  var balanced=Math.abs(totalAssets-(totalLiab+totalEquity))<0.5;

    +'<div style="font-size:12px;color:var(--muted);margin-bottom:12px;">As of today · built from the General Ledger</div>'

    +'<div style="font-size:12px;color:'+(balanced?'var(--success)':'var(--danger)')+';margin-top:10px;font-weight:700;">'
      +(balanced?'✓ Assets = Liabilities + Equity':'⚠ Out of balance by '+coMoney(Math.abs(totalAssets-(totalLiab+totalEquity))))+'</div>'
  +'</div>';

function renderCashFlow(){
  if(!(window.SDD && window.SDD.ledger)) return '<div class="co-card">Ledger not available.</div>';
  // Simple cash-basis view: every ledger line touching a Bank account.
  var bankIds={}; (window.SDD.accounts||[]).forEach(function(a){ if(a.type==='Bank' && a.level===1) bankIds[a.id]=a.name; });
  var inflow=0, outflow=0, rows=[];
  window.SDD.ledger().forEach(function(e){
    (e.lines||[]).forEach(function(ln){
      if(bankIds[ln.account]){
        var amt=(ln.debit||0)-(ln.credit||0); // debit to bank = cash in
        if(amt>0) inflow+=amt; else outflow+=Math.abs(amt);
        rows.push({date:e.date, ref:e.ref||e.id, memo:e.memo, acct:bankIds[ln.account], amount:amt, source:e.source});
      }
    });
  });
  rows.sort(function(a,b){ return (Date.parse(b.date)||0)-(Date.parse(a.date)||0); });
  var net=inflow-outflow;
  var summary='<table class="co-table" style="max-width:560px;margin-bottom:16px;">'
    +_fsRow('Cash In (deposits, collections)', inflow, {color:'var(--success)'})
    +_fsRow('Cash Out (payments)', -outflow, {color:'var(--danger)'})
    +_fsRow('Net Cash Flow', net, {bold:true, big:true, topBorder:true, color:(net<0?'var(--danger)':'var(--success)')})
    +'</table>';
  var detail=rows.length? '<table class="co-table"><tr><th>Date</th><th>Ref</th><th>Description</th><th>Account</th><th style="text-align:right;">Amount</th></tr>'
    +rows.map(function(r){ return '<tr><td>'+(r.date||'—')+'</td><td>'+r.ref+'</td><td>'+r.memo+'</td><td style="color:var(--muted);">'+r.acct+'</td>'
      +'<td style="text-align:right;font-weight:700;color:'+(r.amount<0?'var(--danger)':'var(--success)')+';">'+coMoney(r.amount)+'</td></tr>'; }).join('')
    +'</table>' : '<div style="padding:16px;color:var(--muted2);font-style:italic;">No cash movements yet.</div>';
  return '<div class="co-card"><h3>Cash Flow</h3>'
    +'<div style="font-size:12px;color:var(--muted);margin-bottom:12px;">Cash basis · movements through bank accounts</div>'
    +summary
    +'<h3 style="font-size:15px;">Cash movements</h3>'+detail+'</div>';
}

// ── Signature pad (shared logic, scoped to the user modal) ──
var _userSigCtx=null, _userSigDrawing=false, _userSigDirty=false, _userSigHasSaved=false;
function _userSigInit(existing){
  var cv=document.getElementById('_userSigPad'); if(!cv) return;
  var ctx=cv.getContext('2d');
  ctx.lineWidth=2.2; ctx.lineCap='round'; ctx.lineJoin='round'; ctx.strokeStyle='#1f2630';
  _userSigCtx=ctx; _userSigDirty=false; _userSigHasSaved=!!existing;
  // preload existing signature so the user sees what's saved
  if(existing){
    var img=new Image();
    img.onload=function(){ ctx.drawImage(img,0,0,cv.width,cv.height); };
    img.src=existing;
  }
  var pos=function(e){
    var r=cv.getBoundingClientRect();
    var cx=(e.touches?e.touches[0].clientX:e.clientX)-r.left;
    var cy=(e.touches?e.touches[0].clientY:e.clientY)-r.top;
    // canvas is CSS-scaled → map back to internal coords
    return {x:cx*(cv.width/r.width), y:cy*(cv.height/r.height)};
  };
  var start=function(e){ e.preventDefault(); _userSigDrawing=true; _userSigDirty=true; var p=pos(e); ctx.beginPath(); ctx.moveTo(p.x,p.y); };
  var move=function(e){ if(!_userSigDrawing)return; e.preventDefault(); var p=pos(e); ctx.lineTo(p.x,p.y); ctx.stroke(); };
  var end=function(){ _userSigDrawing=false; };
  cv.addEventListener('mousedown',start); cv.addEventListener('mousemove',move); cv.addEventListener('mouseup',end); cv.addEventListener('mouseleave',end);
  cv.addEventListener('touchstart',start,{passive:false}); cv.addEventListener('touchmove',move,{passive:false}); cv.addEventListener('touchend',end);
}
function _userSigClear(){
  var cv=document.getElementById('_userSigPad'); if(!cv||!_userSigCtx) return;
  _userSigCtx.clearRect(0,0,cv.width,cv.height);
  _userSigDirty=true; _userSigHasSaved=false;  // cleared → will remove saved signature on save
}
// Detect whether the canvas has any ink
function _userSigIsBlank(cv){
  var blank=document.createElement('canvas'); blank.width=cv.width; blank.height=cv.height;
  return cv.toDataURL()===blank.toDataURL();
}

function coSaveUser(id){
  var u=USERS.filter(function(x){return x.id===id;})[0]; if(!u) return;

function coFlash(msg){
  var f=document.createElement('div');
  f.style.cssText='position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1f2630;color:#fff;padding:12px 22px;border-radius:8px;font-family:Barlow,sans-serif;font-size:14px;font-weight:600;z-index:6000;box-shadow:0 6px 20px rgba(0,0,0,.25);';
  f.textContent=msg;
  document.body.appendChild(f);
  setTimeout(function(){ f.remove(); },2400);
}

// init
(function(){
  try{
    var _p=new URLSearchParams(window.location.search);
    var g=_p.get('group'), tab=_p.get('tab');
    if(g){
      coShowGroup(g);
      if(tab){ _coActiveTab=tab; coShow(tab); }
      return;
    }
  }catch(e){}
  coShowGroup('company');
})();
</script>
