<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--gold:#B8922A;--gold-light:#C9A84C;--gold-dim:rgba(184,146,42,0.12);--gold-dim2:rgba(184,146,42,0.07);--surface:#FFFFFF;--surface2:#F5F4F1;--surface3:#ECEAE5;--border:rgba(0,0,0,0.08);--border2:rgba(0,0,0,0.14);--text:#1A1A1A;--muted:#777;--muted2:#AAA;--danger:#D94F4F;--success:#3A9E6A;--warning:#C8822A;--info:#3A7ED4;--purple:#7C5CBF;}
body{background:#F0EEE9;color:var(--text);font-family:'Barlow',sans-serif;font-size:14px;min-height:100vh;display:flex;flex-direction:column;}
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;position:sticky;top:0;z-index:100;}
.logo{display:flex;align-items:center;gap:12px;}
.logo-svg .s-bar{fill:var(--gold);}.logo-svg .letters{fill:#1A1A1A;}
.logo-text{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:600;letter-spacing:.12em;color:var(--muted);text-transform:uppercase;}
.nav{display:flex;gap:4px;}
.nav-item{padding:6px 14px;border-radius:6px;font-size:14px;color:var(--muted);cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:7px;text-decoration:none;}
.nav-item:hover{background:var(--surface2);color:var(--text);}
.nav-item.active{background:var(--gold-dim);color:var(--gold);}
.nav-item svg{width:15px;height:15px;opacity:.7;}
.btn{padding:8px 18px;border-radius:6px;font-size:14px;font-family:'Barlow',sans-serif;cursor:pointer;transition:all .15s;border:none;display:inline-flex;align-items:center;gap:6px;}
.btn-gold{background:var(--gold);color:#fff;font-weight:600;}
.btn-gold:hover{background:var(--gold-light);}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border2);}
.btn-ghost:hover{background:var(--surface2);color:var(--text);}
.btn-sm{padding:5px 13px;font-size:13px;}
.app{display:flex;flex:1;overflow:hidden;height:calc(100vh - 112px);}
.view-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 24px;display:flex;align-items:center;gap:8px;flex-shrink:0;}
.view-toggle{display:flex;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:3px;gap:2px;}
.vt-btn{padding:5px 16px;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;border:none;background:transparent;color:var(--muted);font-family:'Barlow',sans-serif;transition:all .15s;white-space:nowrap;}
.vt-btn.active{background:var(--surface);color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,.1);}
.panel-left{width:300px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;transition:all .2s;}
.search-box{margin:12px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:8px 12px;display:flex;align-items:center;gap:8px;}
.search-box input{background:none;border:none;outline:none;color:var(--text);font-family:'Barlow',sans-serif;font-size:14px;flex:1;}
.search-box input::placeholder{color:var(--muted2);}
.left-list{flex:1;overflow-y:auto;}
.left-list::-webkit-scrollbar{width:4px;}
.left-list::-webkit-scrollbar-thumb{background:var(--surface3);border-radius:2px;}
.list-item{padding:13px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .12s;}
.list-item:hover{background:var(--surface2);}
.list-item.active{background:var(--gold-dim2);border-left:3px solid var(--gold);}
.li-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:3px;}
.li-name{font-size:14px;font-weight:600;}
.li-amt{font-size:14px;font-weight:700;color:var(--danger);}
.li-sub{font-size:12px;color:var(--muted);}
.panel-right{flex:1;overflow-y:auto;background:#F0EEE9;}
.panel-right::-webkit-scrollbar{width:6px;}
.panel-right::-webkit-scrollbar-thumb{background:var(--surface3);border-radius:3px;}
.empty-state{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;color:var(--muted);}
.empty-state svg{width:40px;height:40px;opacity:.25;}
.detail-wrap{padding:20px 24px;}
.card{background:var(--surface);border-radius:12px;padding:18px 20px;margin-bottom:14px;}
.card-title{font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;}
.pill{font-size:11px;padding:3px 9px;border-radius:20px;font-weight:600;}
.pill-paid{background:rgba(58,158,106,.12);color:var(--success);}
.pill-unpaid{background:rgba(217,79,79,.1);color:var(--danger);}
.pill-partial{background:rgba(200,130,42,.12);color:var(--warning);}
table{width:100%;border-collapse:collapse;font-size:13px;}
th{text-align:left;color:var(--muted);font-weight:600;font-size:11px;letter-spacing:.04em;padding:7px 10px;border-bottom:1px solid var(--border);}
td{padding:10px 10px;border-bottom:1px solid var(--border);vertical-align:middle;}

<style>
.co-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px 20px;margin-bottom:16px;}
.co-card h3{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:700;margin:0 0 12px;}
.co-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.ff{display:flex;flex-direction:column;gap:4px;margin-bottom:10px;}
.ff label{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;}
.ff input,.ff select,.ff textarea{padding:9px 11px;border:1.5px solid var(--border2);border-radius:8px;font-family:'Barlow',sans-serif;font-size:14px;outline:none;background:#fff;}
.co-table{width:100%;border-collapse:collapse;}
.co-table th{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);padding:9px 10px;text-align:left;border-bottom:1px solid var(--border);}
.co-table td{font-size:13px;padding:10px;border-bottom:1px solid var(--border);vertical-align:middle;}
.pill{font-size:11px;font-weight:700;padding:2px 9px;border-radius:20px;}
.doc-ok{background:rgba(58,158,106,.12);color:var(--success);}
.doc-soon{background:rgba(200,130,42,.14);color:var(--warning);}
.doc-exp{background:rgba(217,79,79,.12);color:var(--danger);}
.role-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;text-transform:uppercase;}
.r-admin{background:rgba(124,92,191,.14);color:var(--purple);}
.r-manager{background:rgba(58,126,212,.14);color:var(--info);}
.r-driver{background:rgba(184,146,42,.14);color:var(--gold);}
.co-btn{padding:7px 14px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:1.5px solid var(--border2);background:#fff;color:var(--text);font-family:'Barlow',sans-serif;}
.co-btn-gold{background:var(--gold);color:#fff;border-color:var(--gold);}
.co-btn-sm{padding:4px 10px;font-size:12px;}
.veh-doc-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--border);}
</style>

// ===== Helpers =====
function coParseD(d){ var t=Date.parse(d||''); return isNaN(t)?null:new Date(t); }
function coDocStatus(expires){
  var d=coParseD(expires); if(!d) return {cls:'doc-ok',label:'—'};
  var days=Math.round((d-TODAY_CO)/86400000);
  if(days<0) return {cls:'doc-exp',label:'Expired'};
  if(days<=60) return {cls:'doc-soon',label:'Renew soon ('+days+'d)'};
  return {cls:'doc-ok',label:'Valid'};
}
function coAcctName(id){ var a=ACCOUNTS.filter(function(x){return x.id===id;})[0]; return a?a.name:'—'; }

// ===== Tab switching =====
function coShow(tab){
  ['settings','coa','reports','users','fleet','compliance'].forEach(function(t){
    var b=document.getElementById('tab-'+t); if(b) b.classList.toggle('active', t===tab);
  });
  var el=document.getElementById('co-content');
  if(tab==='settings') el.innerHTML=renderSettings();
  else if(tab==='coa') el.innerHTML=renderCOA();
  else if(tab==='reports') el.innerHTML=renderReports();
  else if(tab==='users') el.innerHTML=renderUsers();
  else if(tab==='fleet') el.innerHTML=renderFleet();
  else if(tab==='compliance') el.innerHTML=renderCompliance();
}

// ===== REPORTS: transactions per account =====
function renderReports(){
  // Build a transactions list from SDD (invoices, bills) mapped to accounts
  var opts=ACCOUNTS.filter(function(a){return a.level===1;}).map(function(a){return '<option value="'+a.id+'">'+a.name+'</option>';}).join('');
  return '<div class="co-card"><h3>Account Reports</h3>'
    +'<div style="display:flex;gap:10px;align-items:flex-end;margin-bottom:12px;">'
      +'<div class="ff" style="flex:1;margin:0;"><label>Account</label><select id="rptAcct" onchange="coRunReport()">'+opts+'</select></div>'
      +'<button class="co-btn co-btn-gold" onclick="coRunReport()">Run Report</button>'
    +'</div>'
    +'<div id="rptOut"><div style="padding:20px;text-align:center;color:var(--muted2);font-style:italic;">Select an account and run the report.</div></div>'
  +'</div>';
}
function coRunReport(){
  var sel=document.getElementById('rptAcct'); if(!sel) return;
  var acctId=sel.value; var acctName=coAcctName(acctId);
  var tx=coCollectTxForAccount(acctId, acctName);
  var out=document.getElementById('rptOut');
  if(!tx.length){ out.innerHTML='<div style="padding:18px;text-align:center;color:var(--muted2);font-style:italic;">No transactions found for '+acctName+'.</div>'; return; }
  var total=0;
  var rows=tx.map(function(t){ total+=t.amount; return '<tr><td>'+t.date+'</td><td>'+t.ref+'</td><td>'+t.desc+'</td><td style="text-align:right;font-weight:700;color:'+(t.amount<0?'var(--danger)':'var(--success)')+';">'+coMoney(t.amount)+'</td></tr>'; }).join('');
  out.innerHTML='<table class="co-table"><tr><th>Date</th><th>Ref</th><th>Description</th><th style="text-align:right;">Amount</th></tr>'+rows
    +'<tr style="background:var(--surface2);"><td colspan="3" style="font-weight:700;">Total · '+tx.length+' transactions</td><td style="text-align:right;font-weight:800;">'+coMoney(total)+'</td></tr></table>';
}
function coMoney(n){ var s=(n<0?'-':'')+'$'+Math.abs(Math.round(n)).toLocaleString('en-US'); return s; }
function coCollectTxForAccount(acctId, acctName){
  var tx=[];
  // Income/AR accounts → invoices; AP/expense → bills. Simple demo mapping.
  var isIncome=/income|receivable|^ar/i.test(acctId)||/income|receivable/i.test(acctName);
  var isAP=/payable|^ap|expense|cogs/i.test(acctId)||/payable|expense/i.test(acctName);
  if(window.SDD && window.SDD.customers && (isIncome || acctId==='ar1' || /income/i.test(acctName))){
    window.SDD.customers.forEach(function(c){ (c.contacts||[]).forEach(function(ct){ (ct.jobs||[]).forEach(function(j){ (j.invoices||[]).forEach(function(iv){
      tx.push({date:iv.date||'', ref:iv.est, desc:c.name+' · invoice', amount:Math.abs(parseFloat(String(iv.amount||'').replace(/[^0-9.]/g,''))||0)});
    }); }); }); });
  }
  if(window.SDD && window.SDD.bills && (isAP || /payable|expense|cogs/i.test(acctName))){
    (window.SDD.bills||[]).forEach(function(b){ tx.push({date:b.date||'', ref:b.num, desc:(b.vendor||'')+' · '+(b.desc||'bill'), amount:-(Math.abs(parseFloat(String(b.amount||'').replace(/[^0-9.]/g,''))||0))}); });
  }
  return tx;
}
function coViewAcctTx(id){ coShow('reports'); setTimeout(function(){ var s=document.getElementById('rptAcct'); if(s){ s.value=id; coRunReport(); } },50); }

    return '<tr><td style="font-weight:700;">'+d.name+'</td><td>'+d.authority+'</td><td>'+d.number+'</td>'
      +'<td>'+d.expires+'</td><td><span class="pill '+st.cls+'">'+st.label+'</span></td>'
      +'<td style="text-align:right;"><button class="co-btn co-btn-sm" onclick="coViewFile(\''+d.file+'\')">View</button> <button class="co-btn co-btn-sm" onclick="coRenewDoc2('+d.id+')">Mark Renewed</button></td></tr>';
  }).join('');
  // Reminders: anything expiring within 60 days or expired
  var soon=COMPLIANCE.concat(FLEET.reduce(function(arr,v){ (v.docs||[]).forEach(function(d){ arr.push({name:v.name+' · '+d.kind, expires:d.expires}); }); return arr; },[]))
    .map(function(d){ return {name:d.name, expires:d.expires, st:coDocStatus(d.expires)}; })
    .filter(function(d){ return d.st.cls!=='doc-ok'; })
    .sort(function(a,b){ return (coParseD(a.expires)||0)-(coParseD(b.expires)||0); });
  var reminders=soon.length?soon.map(function(d){ return '<div class="veh-doc-row"><span style="font-size:13px;">'+d.name+'</span><span><span style="font-size:12px;color:var(--muted);margin-right:8px;">'+d.expires+'</span><span class="pill '+d.st.cls+'">'+d.st.label+'</span></span></div>'; }).join('')
    : '<div style="padding:14px;text-align:center;color:var(--muted2);font-style:italic;">Everything is up to date. 🎉</div>';
  return '<div class="co-card" style="border:1px solid rgba(217,79,79,.25);background:rgba(217,79,79,.03);"><h3 style="color:var(--danger);">⚠ Renewal Reminders</h3>'+reminders+'</div>'
    +'<div class="co-card"><h3>Company Documents <button class="co-btn co-btn-gold co-btn-sm" style="float:right;" onclick="coAddCompliance()">+ Add Document</button></h3>'
    +'<table class="co-table"><tr><th>Document</th><th>Authority</th><th>Number</th><th>Expires</th><th>Status</th><th style="text-align:right;">Actions</th></tr>'+rows+'</table></div>';
}
function coAddCompliance(){ coFlash('Add company document (upload + expiry date)'); }
function coViewFile(f){ coFlash('Opening '+f+' (demo)'); }
function coRenewDoc2(id){ coRenewPrompt('compliance', id); }

// ===== Renew popup (upload + new date) =====
function coRenewPrompt(kind, id, sub){
  var ex=document.getElementById('_coRenewBg'); if(ex) ex.remove();
  var bg=document.createElement('div');
  bg.id='_coRenewBg';
  bg.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:5000;display:flex;align-items:center;justify-content:center;padding:20px;';
  bg.innerHTML='<div style="background:#fff;border-radius:14px;max-width:420px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.3);font-family:Barlow,sans-serif;overflow:hidden;">'
    +'<div style="padding:18px 22px;border-bottom:1px solid var(--border);font-family:\'Barlow Condensed\',sans-serif;font-size:19px;font-weight:700;">Mark as Renewed</div>'
    +'<div style="padding:18px 22px;">'
      +'<div class="ff"><label>Upload new document</label><input type="file"></div>'
      +'<div class="ff"><label>New expiration date</label><input type="date" id="_coNewDate"></div>'
    +'</div>'
    +'<div style="padding:14px 22px;background:var(--surface2);border-top:1px solid var(--border);display:flex;gap:10px;justify-content:flex-end;">'
      +'<button class="co-btn" onclick="document.getElementById(\'_coRenewBg\').remove()">Cancel</button>'
      +'<button class="co-btn co-btn-gold" onclick="coDoRenew(\''+kind+'\','+id+',\''+(sub||'')+'\')">Save Renewal</button>'
    +'</div></div>';
  document.body.appendChild(bg);
  bg.onclick=function(e){ if(e.target===bg) bg.remove(); };
}
function coDoRenew(kind, id, sub){
  var nd=document.getElementById('_coNewDate'); var val=nd?nd.value:'';
  if(!val){ coFlash('Please choose a new expiration date'); return; }
  var human=new Date(val+'T00:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
  if(kind==='compliance'){ var d=COMPLIANCE.filter(function(x){return x.id===id;})[0]; if(d) d.expires=human; }
  else if(kind==='vehicle'){ var v=FLEET.filter(function(x){return x.id===id;})[0]; if(v){ (v.docs||[]).forEach(function(dd){ if(dd.kind===sub) dd.expires=human; }); } }
  var bg=document.getElementById('_coRenewBg'); if(bg) bg.remove();
  // re-render current tab
  var active=document.querySelector('.vt-btn.active'); var tab=active?active.id.replace('tab-',''):'compliance';
  coShow(tab);
  coFlash('Renewed — new expiration '+human);
}

// ===== Flash toast =====
function coFlash(msg){
  var f=document.createElement('div');
  f.style.cssText='position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1f2630;color:#fff;padding:12px 22px;border-radius:8px;font-family:Barlow,sans-serif;font-size:14px;font-weight:600;z-index:6000;box-shadow:0 6px 20px rgba(0,0,0,.25);';
  f.textContent=msg;
  document.body.appendChild(f);
  setTimeout(function(){ f.remove(); },2400);
}

// init
coShow('settings');
</script>
</body>
</html>
