<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SDD — Vendors & Bills</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600&family=Barlow+Condensed:wght@600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--gold:#B8922A;--gold-light:#C9A84C;--gold-dim:rgba(184,146,42,0.12);--gold-dim2:rgba(184,146,42,0.07);--surface:#FFFFFF;--surface2:#F5F4F1;--surface3:#ECEAE5;--border:rgba(0,0,0,0.08);--border2:rgba(0,0,0,0.14);--text:#1A1A1A;--muted:#777;--muted2:#AAA;--danger:#D94F4F;--success:#3A9E6A;--warning:#C8822A;--info:#3A7ED4;--purple:#7C5CBF;}
body{background:#F0EEE9;color:var(--text);font-family:'Barlow',sans-serif;font-size:14px;min-height:100vh;display:flex;flex-direction:column;}
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;position:sticky;top:0;z-index:100;}
.logo{display:flex;align-items:center;gap:12px;}
.logo-svg .s-bar{fill:var(--gold);}.logo-svg .letters{fill:#1A1A1A;}
.logo-text{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:600;letter-spacing:.12em;color:var(--muted);text-transform:uppercase;}
.nav{display:flex;gap:4px;}
.nav-item{padding:6px 14px;border-radius:6px;font-size:14px;color:var(--muted);cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:7px;text-decoration:none;}
.nav-item:hover{background:var(--surface2);color:var(--text);}
.nav-item.active{background:var(--gold-dim);color:var(--gold);}
.nav-item svg{width:15px;height:15px;opacity:.7;}
.btn{padding:8px 18px;border-radius:6px;font-size:14px;font-family:'Barlow',sans-serif;cursor:pointer;transition:all .15s;border:none;display:inline-flex;align-items:center;gap:6px;}
.btn-gold{background:var(--gold);color:#fff;font-weight:600;}
.btn-gold:hover{background:var(--gold-light);}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border2);}
.btn-ghost:hover{background:var(--surface2);color:var(--text);}
.btn-sm{padding:5px 13px;font-size:13px;}
.app{display:flex;flex:1;overflow:hidden;height:calc(100vh - 112px);}
.view-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 24px;display:flex;align-items:center;gap:8px;flex-shrink:0;}
.view-toggle{display:flex;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:3px;gap:2px;}
.vt-btn{padding:5px 16px;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;border:none;background:transparent;color:var(--muted);font-family:'Barlow',sans-serif;transition:all .15s;white-space:nowrap;}
.vt-btn.active{background:var(--surface);color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,.1);}
.panel-left{width:300px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;transition:all .2s;}
.search-box{margin:12px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:8px 12px;display:flex;align-items:center;gap:8px;}
.search-box input{background:none;border:none;outline:none;color:var(--text);font-family:'Barlow',sans-serif;font-size:14px;flex:1;}
.search-box input::placeholder{color:var(--muted2);}
.left-list{flex:1;overflow-y:auto;}
.left-list::-webkit-scrollbar{width:4px;}
.left-list::-webkit-scrollbar-thumb{background:var(--surface3);border-radius:2px;}
.list-item{padding:13px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .12s;}
.list-item:hover{background:var(--surface2);}
.list-item.active{background:var(--gold-dim2);border-left:3px solid var(--gold);}
.li-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:3px;}
.li-name{font-size:14px;font-weight:600;}
.li-amt{font-size:14px;font-weight:700;color:var(--danger);}
.li-sub{font-size:12px;color:var(--muted);}
.panel-right{flex:1;overflow-y:auto;background:#F0EEE9;}
.panel-right::-webkit-scrollbar{width:6px;}
.panel-right::-webkit-scrollbar-thumb{background:var(--surface3);border-radius:3px;}
.empty-state{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;color:var(--muted);}
.empty-state svg{width:40px;height:40px;opacity:.25;}
.detail-wrap{padding:20px 24px;}
.card{background:var(--surface);border-radius:12px;padding:18px 20px;margin-bottom:14px;}
.card-title{font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;}
.pill{font-size:11px;padding:3px 9px;border-radius:20px;font-weight:600;}
.pill-paid{background:rgba(58,158,106,.12);color:var(--success);}
.pill-unpaid{background:rgba(217,79,79,.1);color:var(--danger);}
.pill-partial{background:rgba(200,130,42,.12);color:var(--warning);}
table{width:100%;border-collapse:collapse;font-size:13px;}
th{text-align:left;color:var(--muted);font-weight:600;font-size:11px;letter-spacing:.04em;padding:7px 10px;border-bottom:1px solid var(--border);}
td{padding:10px 10px;border-bottom:1px solid var(--border);vertical-align:middle;}
tr:last-child td{border-bottom:none;}
/* COA */
.coa-wrap{display:flex;flex-direction:column;height:100%;}
.coa-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.coa-search-box{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:7px 12px;display:flex;align-items:center;gap:8px;width:260px;}
.coa-search-box input{background:none;border:none;outline:none;font-family:'Barlow',sans-serif;font-size:14px;color:var(--text);flex:1;}
.coa-search-box input::placeholder{color:var(--muted2);}
.coa-tbl-wrap{flex:1;overflow-y:auto;background:var(--surface);margin:16px;border-radius:12px;box-shadow:0 1px 6px rgba(0,0,0,.07);}
.coa-tbl-wrap::-webkit-scrollbar{width:4px;}
.coa-tbl-wrap::-webkit-scrollbar-thumb{background:var(--surface3);}
.coa-tbl{width:100%;border-collapse:collapse;}
.coa-tbl th{font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);padding:10px 16px;border-bottom:2px solid var(--border);background:var(--surface);text-align:left;position:sticky;top:0;z-index:2;}
.coa-row{border-bottom:1px solid var(--border);transition:background .1s;}
.coa-row:hover{background:var(--surface2);}
.coa-row td{padding:10px 16px;font-size:13px;}
.coa-row td:last-child{text-align:right;}
.coa-row.lvl0 td:first-child{font-weight:700;}
.coa-row.lvl1 td:first-child{font-weight:500;}
.coa-row.lvl2 td:first-child{font-weight:400;color:var(--muted);}
.coa-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;display:inline-block;}
.cb-bank{background:rgba(58,126,212,.1);color:var(--info);}
.cb-asset{background:rgba(58,158,106,.1);color:var(--success);}
.cb-ap{background:rgba(217,79,79,.1);color:var(--danger);}
.cb-cc{background:rgba(217,79,79,.08);color:#B03030;}
.cb-liability{background:rgba(217,79,79,.07);color:#C04040;}
.cb-equity{background:rgba(124,92,191,.1);color:var(--purple);}
.cb-income{background:rgba(58,158,106,.12);color:#2A8A5A;}
.cb-cogs{background:rgba(200,130,42,.12);color:var(--warning);}
.cb-expense{background:rgba(217,79,79,.07);color:#C04040;}
.cb-other{background:var(--surface3);color:var(--muted);}
.exp-btn{background:none;border:none;cursor:pointer;color:var(--muted);font-size:11px;width:20px;height:20px;display:inline-flex;align-items:center;justify-content:center;border-radius:3px;}
.exp-btn:hover{background:var(--surface3);}
.sub-btn{font-size:11px;padding:2px 8px;border-radius:4px;background:var(--surface2);border:1px solid var(--border2);color:var(--muted);cursor:pointer;font-family:'Barlow',sans-serif;transition:all .12s;}
.sub-btn:hover{border-color:var(--gold);color:var(--gold);}
/* MODALS */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:400;align-items:center;justify-content:center;padding:20px;}
.modal-bg.open{display:flex;}
.modal-box{background:var(--surface);border-radius:14px;width:100%;max-width:540px;overflow:hidden;box-shadow:0 16px 48px rgba(0,0,0,.2);}
.modal-head{padding:16px 22px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
.modal-title{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:700;}
.modal-body{padding:20px 22px;max-height:65vh;overflow-y:auto;}
.modal-foot{padding:14px 22px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px;background:var(--surface2);}
.ff{margin-bottom:14px;}
.ff label{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;display:block;margin-bottom:5px;}
.ff input,.ff select,.ff textarea{width:100%;background:var(--surface2);border:1.5px solid var(--border2);border-radius:8px;padding:10px 13px;font-family:'Barlow',sans-serif;font-size:14px;color:var(--text);outline:none;transition:border .15s;}
.ff input:focus,.ff select:focus{border-color:var(--gold);}
.fg2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
svg{display:block;}
@media(max-width:768px){.nav{display:none;}.logo-text{display:none;}.app{flex-direction:column;height:auto;}.panel-left{width:100%;}.left-list{max-height:200px;}body{padding-bottom:72px;}.mobile-nav{display:flex !important;}}
.mobile-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);z-index:200;padding:8px 0 12px;}
.mobile-nav a{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;font-size:10px;font-weight:600;color:var(--muted);text-decoration:none;}
.mobile-nav a.active{color:var(--gold);}
.mobile-nav svg{width:22px;height:22px;}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
  if(window['pdfjsLib']){ pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js'; }
</script>
</head>
<body>

<div class="header">
  <div class="logo">
    <svg class="logo-svg" viewBox="0 0 120 60" width="56" height="28"><polygon class="s-bar" points="28,8 58,8 42,52 12,52"/><text x="4" y="50" font-family="Arial Black,sans-serif" font-weight="900" font-size="46" class="letters">S</text><text x="44" y="50" font-family="Arial Black,sans-serif" font-weight="900" font-size="46" class="letters">DD</text></svg>
    <span class="logo-text">Demolition</span>
  </div>
  <nav class="nav">
    <a class="nav-item" href="/sdd-home.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>Home</a>
    <a class="nav-item" href="/index.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>Dashboard</a>
    <a class="nav-item" href="/sdd-customers.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>Customers</a>
    <a class="nav-item" href="/sdd-invoices.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>Invoices</a>
    <a class="nav-item active" href="/sdd-vendors.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>Vendors</a>
    <a class="nav-item" href="/sdd-banking.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>Banking</a>
    <a class="nav-item" href="/sdd-company.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 21h18M9 8h1m-1 4h1m4-4h1m-1 4h1M5 21V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v16"/></svg>Company</a>
  </nav>
  <button class="btn btn-gold" id="addBtn"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg><span id="addBtnLabel">New vendor</span></button>
</div>

<div class="view-bar">
  <div class="view-toggle" id="bankingTabs" style="display:none;">
    <button class="vt-btn active" id="btnBanking" onclick="setView('banking')">Banking</button>
    <button class="vt-btn" id="btnRecon" onclick="setView('recon')">Reconciliation</button>
    <button class="vt-btn" id="btnCOA" onclick="setView('coa')">Chart of Accounts</button>
    <button class="vt-btn" id="btnCC" onclick="setView('cc')">Credit Cards</button>
  </div>
  <div class="view-toggle" id="vendorTabs" style="display:none;">
    <button class="vt-btn active" id="btnVendors" onclick="setView('vendors')">Vendors</button>
    <button class="vt-btn" id="btnBills" onclick="setView('bills')">Bills</button>
  </div>
</div>

<div class="app">
  <div class="panel-left" id="leftPanel">
    <div class="search-box">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px;flex-shrink:0;color:var(--muted);"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="searchInput" placeholder="Search vendors..." oninput="renderLeft(this.value)">
    </div>
    <div class="left-list" id="leftList"></div>
  </div>
  <div class="panel-right" id="panelRight">
    <div class="empty-state">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      <span>Select a vendor to view details</span>
    </div>
  </div>
</div>

<!-- VENDOR MODAL -->
<div class="modal-bg" id="vendorModal">
  <div class="modal-box">
    <div class="modal-head"><div class="modal-title">New vendor</div><button class="btn btn-ghost btn-sm" onclick="closeModal('vendorModal')">&#10005;</button></div>
    <div class="modal-body">
      <div class="ff"><label>Vendor name *</label><input type="text" id="v_name" placeholder="Company name"></div>
      <div class="ff"><label>Default account (Chart of Accounts)</label><select id="v_account"></select></div>
      <div class="fg2">
        <div class="ff"><label>1099 eligible</label><select id="v_1099" onchange="toggleVendor1099()"><option value="no">No</option><option value="yes">Yes</option></select></div>
        <div class="ff"><label>Billed vendor</label><select id="v_billed"><option value="yes">Yes</option><option value="no">No</option></select></div>
      </div>
      <div id="v_1099_fields" style="display:none;border-top:1px solid var(--border);margin-top:6px;padding-top:14px;">
        <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--warning);margin-bottom:10px;">1099 vendor details (required for tax reporting)</div>
        <div class="fg2">
          <div class="ff"><label>Contact</label><input type="text" id="v_contact" placeholder="Name"></div>
          <div class="ff"><label>Phone</label><input type="tel" id="v_phone" placeholder="(619) 555-0000"></div>
          <div class="ff"><label>Email</label><input type="email" id="v_email" placeholder="email@company.com"></div>
        </div>
        <div class="ff"><label>Company address</label><input type="text" id="v_address" placeholder="Street, City, State ZIP"></div>
      </div>
    </div>
    <div class="modal-foot"><button class="btn btn-ghost btn-sm" onclick="closeModal('vendorModal')">Cancel</button><button class="btn btn-gold" onclick="saveVendor()">Save Vendor</button></div>
  </div>
</div>

<!-- BILL MODAL -->
<div class="modal-bg" id="billModal">
  <div class="modal-box">
    <div class="modal-head"><div class="modal-title">New bill</div><button class="btn btn-ghost btn-sm" onclick="closeModal('billModal')">&#10005;</button></div>
    <div class="modal-body">
      <div class="fg2">
        <div class="ff" style="position:relative;"><label>Vendor *</label>
          <input type="text" id="b_vendor_search" autocomplete="off" placeholder="Type vendor name..." oninput="billVendorSearch(this.value)" onfocus="billVendorSearch(this.value)">
          <input type="hidden" id="b_vendor">
          <div id="b_vendor_drop" style="display:none;position:absolute;top:100%;left:0;right:0;background:#fff;border:1px solid var(--border2);border-radius:8px;box-shadow:0 8px 24px rgba(0,0,0,.12);z-index:50;max-height:220px;overflow-y:auto;margin-top:2px;"></div>
        </div>
        <div class="ff"><label>Associated estimate / change order *</label><select id="b_estimate"></select></div>
      </div>
      <div class="fg2">
        <div class="ff" style="position:relative;"><label>Ledger account</label>
          <input type="text" id="b_account_search" autocomplete="off" placeholder="Search account..." oninput="billAccountSearch(this.value)" onfocus="billAccountSearch(this.value)">
          <input type="hidden" id="b_account">
          <div id="b_account_drop" style="display:none;position:absolute;top:100%;left:0;right:0;background:#fff;border:1px solid var(--border2);border-radius:8px;box-shadow:0 8px 24px rgba(0,0,0,.12);z-index:50;max-height:220px;overflow-y:auto;margin-top:2px;"></div>
        </div>
        <div class="ff"><label>Amount *</label><input type="text" id="b_amount" placeholder="$0.00"></div>
      </div>
      <div class="ff"><label>Memo</label><input type="text" id="b_desc" placeholder="Memo / note for this bill"></div>
      <div class="fg2">
        <div class="ff"><label>Bill date</label><input type="text" id="b_date" placeholder="May 10, 2026"></div>
        <div class="ff"><label>Due date</label><input type="text" id="b_due" placeholder="May 25, 2026"></div>
      </div>
      <div class="ff"><label>Status</label><select id="b_status"><option value="unpaid">Pending (to pay)</option><option value="paid">Paid</option></select></div>
    </div>
    <div class="modal-foot"><button class="btn btn-ghost btn-sm" onclick="closeModal('billModal')">Cancel</button><button class="btn btn-gold" onclick="saveBill()">Save Bill</button></div>
  </div>
</div>

<!-- COA MODAL -->
<div class="modal-bg" id="coaModal">
  <div class="modal-box">
    <div class="modal-head"><div class="modal-title" id="coaModalTitle">New account</div><button class="btn btn-ghost btn-sm" onclick="closeModal('coaModal')">&#10005;</button></div>
    <div class="modal-body">
      <div class="ff"><label>Account name *</label><input type="text" id="coa_name" placeholder="e.g. Disposal Fees"></div>
      <div class="ff"><label>Account type *</label>
        <select id="coa_type">
          <option>Bank</option><option>Accounts Receivable</option><option>Other Current Asset</option><option>Fixed Asset</option><option>Accounts Payable</option><option>Credit Card</option><option>Other Current Liability</option><option>Long Term Liability</option><option>Equity</option><option>Income</option><option>Cost of Goods Sold</option><option selected>Expense</option><option>Other Income</option><option>Other Expense</option><option>Non-Posting</option>
        </select>
      </div>
      <div class="ff"><label>Parent account (optional)</label><select id="coa_parent"><option value="">&#8212; Top level &#8212;</option></select></div>
      <div style="background:rgba(58,126,212,.07);border:1px solid rgba(58,126,212,.2);border-radius:8px;padding:10px 14px;font-size:13px;color:var(--info);">Balance starts at <strong>$0.00</strong>. Will update when connected to Supabase.</div>
    </div>
    <div class="modal-foot"><button class="btn btn-ghost btn-sm" onclick="closeModal('coaModal')">Cancel</button><button class="btn btn-gold" onclick="saveCOAAccount()">Save Account</button></div>
  </div>
</div>

function fmt(n){ return '$'+Number(n).toLocaleString('en-US',{minimumFractionDigits:0,maximumFractionDigits:0}); }
function flash(msg,col){ var e=document.createElement('div'); e.style.cssText='position:fixed;bottom:24px;right:24px;background:'+(col||'var(--success)')+';color:#fff;padding:12px 20px;border-radius:8px;font-size:14px;font-weight:600;z-index:9999;'; e.textContent=msg; document.body.appendChild(e); setTimeout(function(){e.remove();},3000); }
function closeModal(id){ document.getElementById(id).classList.remove('open'); }

function setView(v){
  currentView=v; activeId=null;
  var map={vendors:'btnVendors',bills:'btnBills',cc:'btnCC',banking:'btnBanking',recon:'btnRecon',coa:'btnCOA'};
  Object.keys(map).forEach(function(k){ var el=document.getElementById(map[k]); if(el) el.classList.toggle('active',k===v); });
  var labels={vendors:'New vendor',bills:'New bill',cc:'Add card',banking:'Import transactions',recon:'Import statement',coa:'New account'};
  var lbl=document.getElementById('addBtnLabel'); if(lbl) lbl.textContent=labels[v]||'Add';
  var si=document.getElementById('searchInput'); if(si) si.value='';
  var lp=document.getElementById('leftPanel');
  if(v==='coa'){ if(lp) lp.style.display='none'; renderCOAView(); }
  else if(v==='banking'){ if(lp) lp.style.display='none'; renderBankingView(); }
  else { if(lp) lp.style.display=''; renderLeft(''); renderEmptyRight(); }
}

function renderLeft(q){
  var el=document.getElementById('leftList'); if(!el) return;
  var lq=(q||'').toLowerCase();
  if(currentView==='vendors') el.innerHTML=buildVendorList(lq);
  else if(currentView==='bills') el.innerHTML=buildBillList(lq);
  else if(currentView==='cc') el.innerHTML=buildCCList();
  else el.innerHTML='<div style="padding:20px;color:var(--muted2);text-align:center;">Import a bank statement to begin</div>';
}

function renderEmptyRight(){
  var pr=document.getElementById('panelRight');
  var labels={vendors:'Select a vendor',bills:'Select a bill',cc:'Select a card',recon:'Select an entry'};
  pr.innerHTML='<div class="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="width:40px;height:40px;opacity:.25;"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg><span>'+(labels[currentView]||'Select item')+'</span></div>';
}

// Subtítulo del listado lateral: muestra tipo (si existe) + cuenta contable asociada
function _vendorSubLine(v){
  var parts=[];
  if(v.type){ parts.push(v.type.charAt(0).toUpperCase()+v.type.slice(1)); }
  if(v.eligible1099==='yes'){ parts.push('<span style="color:var(--warning);">1099</span>'); }
  var sep=' &nbsp;&#183;&nbsp; ';
  var lead=parts.join(sep);
  var acct;
  if(v.accountName){ acct='<span style="color:var(--info);">'+v.accountName+'</span>'; }
  else { acct='<span style="color:var(--warning);font-style:italic;">No account assigned</span>'; }
  return lead ? (lead+sep+acct) : acct;
}
function buildVendorList(q){
  var filtered=VENDORS.filter(function(v){ return !q||v.name.toLowerCase().includes(q)||v.type.includes(q); });
  if(!filtered.length) return '<div style="padding:20px;color:var(--muted2);text-align:center;">No vendors found</div>';
  return filtered.map(function(v){
    var bills=BILLS.filter(function(b){return b.vendorId===v.id;});
    var owed=bills.filter(function(b){return b.status!=='paid';}).reduce(function(s,b){return s+b.amount;},0);
    return '<div class="list-item'+(activeId===v.id?' active':'')+'" onclick="selectVendor('+v.id+')">'
      +'<div class="li-top"><div class="li-name">'+v.name+'</div>'+(owed>0?'<div class="li-amt">'+fmt(owed)+'</div>':'')+'</div>'
      +'<div class="li-sub">'+_vendorSubLine(v)+'</div>'
      +'</div>';
  }).join('');
}

function buildBillList(q){
  var filtered=BILLS.filter(function(b){ var v=VENDORS.find(function(x){return x.id===b.vendorId;}); return !q||(v&&v.name.toLowerCase().includes(q))||b.desc.toLowerCase().includes(q); });
  if(!filtered.length) return '<div style="padding:20px;color:var(--muted2);text-align:center;">No bills</div>';
  return filtered.map(function(b){
    var v=VENDORS.find(function(x){return x.id===b.vendorId;})||{name:'Unknown'};
    var pc=b.status==='paid'?'pill-paid':b.status==='partial'?'pill-partial':'pill-unpaid';
    return '<div class="list-item'+(activeId===b.id?' active':'')+'" onclick="selectBill('+b.id+')">'
      +'<div class="li-top"><div class="li-name">'+b.num+'</div><div class="li-amt">'+fmt(b.amount)+'</div></div>'
      +'<div class="li-sub">'+v.name+(b.estimate?' &nbsp;&#183;&nbsp; <span style="color:var(--info);">'+b.estimate+'</span>':'')+'</div>'
      +'<div style="display:flex;justify-content:space-between;margin-top:5px;"><span style="font-size:11px;color:var(--muted2);">Due: '+b.due+'</span><span class="pill '+pc+'">'+b.status+'</span></div>'
      +'</div>';
  }).join('');
}

function buildCCList(){
  return CC_ACCTS.map(function(c){
    var pct=Math.round(c.used/c.limit*100);
    return '<div class="list-item'+(activeId===('cc'+c.id)?' active':'')+'" onclick="selectCard('+c.id+')">'
      +'<div class="li-top"><div class="li-name">'+c.name+'</div><div style="font-size:12px;color:var(--muted);">&#183;&#183;&#183;'+c.last4+'</div></div>'
      +'<div style="margin:8px 0 4px;"><div style="height:6px;border-radius:3px;background:var(--surface3);"><div style="height:100%;border-radius:3px;background:'+c.color+';width:'+pct+'%;"></div></div></div>'
      +'<div style="display:flex;justify-content:space-between;font-size:11px;color:var(--muted);"><span>'+fmt(c.used)+' used</span><span>'+pct+'% of '+fmt(c.limit)+'</span></div>'
      +'</div>';
  }).join('');
}

function selectVendor(id){
  activeId=id;
  var v=VENDORS.find(function(x){return x.id===id;}); if(!v) return;
  renderLeft('');
  var vb=BILLS.filter(function(b){return b.vendorId===id;});
  var owed=vb.filter(function(b){return b.status!=='paid';}).reduce(function(s,b){return s+b.amount;},0);
  var pr=document.getElementById('panelRight');
  pr.innerHTML='<div class="detail-wrap">'
    +'<div class="card"><div style="display:flex;justify-content:space-between;align-items:flex-start;">'
    +'<div><div style="font-family:\'Barlow Condensed\',sans-serif;font-size:26px;font-weight:700;">'+v.name+'</div>'
    +'<div style="font-size:13px;color:var(--muted);margin-top:4px;">'+(v.type.charAt(0).toUpperCase()+v.type.slice(1))+' &#183; Since '+(v.since||'&#8212;')+'</div>'
    +'<div style="margin-top:8px;display:flex;gap:8px;">'
    +(v.eligible1099==='yes'?'<span style="font-size:11px;font-weight:700;padding:2px 9px;border-radius:20px;background:rgba(200,130,42,.12);color:var(--warning);">1099 Eligible</span>':'')
    +(v.billed==='yes'?'<span style="font-size:11px;font-weight:700;padding:2px 9px;border-radius:20px;background:rgba(58,126,212,.1);color:var(--info);">Billed Vendor</span>':'')
    +'</div></div>'
    +'<div style="text-align:right;"><div style="font-size:11px;color:var(--muted);">Amount owed</div><div style="font-size:28px;font-weight:700;color:'+(owed>0?'var(--danger)':'var(--success)')+';">'+fmt(owed)+'</div></div>'
    +'</div></div>'

// ── Transacciones por método de pago (Chase, Amex, etc.) para un vendor ──
function _vendorTxnsBlock(v){
  // Cruzar BANK_TXNS por payee que coincida con el nombre del vendor (cargos salientes)
  var name=(v.name||'').toLowerCase();
  var txns=(typeof BANK_TXNS!=='undefined'?BANK_TXNS:[]).filter(function(t){
    if(t.dir!=='out') return false;
    var p=(t.payee||'').toLowerCase();
    return p===name || p.indexOf(name)>-1 || name.indexOf(p)>-1;
  });
  // Agrupar por cuenta de pago (tarjeta/banco)
  var acctName=function(id){ var a=(typeof BANK_ACCOUNTS!=='undefined'?BANK_ACCOUNTS:[]).find(function(x){return x.id===id;}); return a?a.name+' ····'+a.last4:id; };
  var groups={};
  txns.forEach(function(t){ if(!groups[t.account]) groups[t.account]={count:0,total:0}; groups[t.account].count++; groups[t.account].total+=t.amount; });
  var keys=Object.keys(groups);
  var grand=txns.reduce(function(s,t){return s+t.amount;},0);
  var rows;
  if(!keys.length){
    rows='<div style="color:var(--muted2);font-style:italic;font-size:13px;">No transactions recorded for this vendor.</div>';
  } else {
    rows='<table><thead><tr><th>Payment method</th><th style="text-align:center;"># Transactions</th><th style="text-align:right;">Total</th></tr></thead><tbody>'
      +keys.map(function(k){ return '<tr><td style="font-weight:600;">'+acctName(k)+'</td><td style="text-align:center;color:var(--muted);">'+groups[k].count+'</td><td style="text-align:right;font-weight:600;">'+fmt(groups[k].total)+'</td></tr>'; }).join('')
      +'<tr style="border-top:2px solid var(--border2);"><td style="font-weight:700;">Total</td><td style="text-align:center;font-weight:700;">'+txns.length+'</td><td style="text-align:right;font-weight:700;color:var(--info);">'+fmt(grand)+'</td></tr>'

  }
  return '<div class="card"><div class="card-title">Transactions by payment method</div>'+rows+'</div>';
}

  return p.level===0 ? true : coaVisible(p);
}

function importPdfFile(input){
  var file=input.files&&input.files[0];
  if(!file) return;
  var status=document.getElementById('_imp_pdf_status');
  if(!window['pdfjsLib']){ status.innerHTML='<span style="color:var(--danger);">PDF reader not loaded. Check your internet and reopen.</span>'; return; }
  status.textContent='Reading "'+file.name+'"...';
  var reader=new FileReader();
  reader.onload=function(){
    var typed=new Uint8Array(reader.result);
    pdfjsLib.getDocument({data:typed}).promise.then(function(pdf){
      var pages=[]; for(var i=1;i<=pdf.numPages;i++) pages.push(i);
      return Promise.all(pages.map(function(n){
        return pdf.getPage(n).then(function(page){
          return page.getTextContent().then(function(tc){
            // Reconstruct lines using Y positions
            var rows={};
            tc.items.forEach(function(it){
              var y=Math.round(it.transform[5]);
              (rows[y]=rows[y]||[]).push({x:it.transform[4], s:it.str});
            });
            var ys=Object.keys(rows).map(Number).sort(function(a,b){return b-a;});
            return ys.map(function(y){
              return rows[y].sort(function(a,b){return a.x-b.x;}).map(function(o){return o.s;}).join(' ');
            }).join('\n');
          });
        });
      }));
    }).then(function(pageTexts){
      var fullText=pageTexts.join('\n');
      var parsed=parseChaseStatement(fullText);
      if(parsed.length){
        document.getElementById('_imp_text').value=parsed.join('\n');
        document.getElementById('_imp_preview').textContent=parsed.length+' transaction'+(parsed.length>1?'s':'')+' detected — review them below, then Import.';
        status.innerHTML='<span style="color:#16a34a;">✓ '+parsed.length+' transactions read from PDF. Please review before importing.</span>';
      } else {
        status.innerHTML='<span style="color:var(--warning);">Could not detect transactions automatically. You can paste them manually below.</span>';
      }
    }).catch(function(err){
      status.innerHTML='<span style="color:var(--danger);">Could not read the PDF. You can paste lines manually.</span>';
      console.warn('PDF parse error',err);
    });
  };
  reader.readAsArrayBuffer(file);
}
// Parse a Chase Business Checking statement text into "date, description, amount" lines
function parseChaseStatement(text){
  var out=[];
  var lines=text.split('\n');
  var year='2026';
  // Try to detect the statement year from the header (e.g., "through March 31, 2026")
  var ym=text.match(/through\s+\w+\s+\d{1,2},\s+(\d{4})/i);
  if(ym) year=ym[1];
  // Section detection
  var section='';
  var monthMap={jan:'Jan',feb:'Feb',mar:'Mar',apr:'Apr',may:'May',jun:'Jun',jul:'Jul',aug:'Aug',sep:'Sep',oct:'Oct',nov:'Nov',dec:'Dec'};
  for(var i=0;i<lines.length;i++){
    var L=lines[i].trim();
    var up=L.toUpperCase();
    if(up.indexOf('DEPOSITS AND ADDITIONS')!==-1){ section='in'; continue; }
    if(up.indexOf('ELECTRONIC WITHDRAWALS')!==-1){ section='out'; continue; }
    if(up.indexOf('CHECKS PAID')!==-1){ section='checks'; continue; }
    if(up.indexOf('FEES')!==-1 && up.length<30){ section='fees'; continue; }
    if(up.indexOf('DAILY ENDING BALANCE')!==-1){ section=''; continue; }
    if(!section) continue;
    // A transaction line starts with MM/DD and ends with an amount
    // e.g. "03/03 Deposit 2174320055 106,670.55"
    var m=L.match(/^(\d{2})\/(\d{2})\s+(.*?)\s+([\d,]+\.\d{2})\s*$/);
    if(m){
      var mm=parseInt(m[1],10), dd=parseInt(m[2],10);
      var desc=m[3].replace(/\s+/g,' ').trim();
      desc=cleanChaseDesc(desc);
      var amt=parseFloat(m[4].replace(/,/g,''));
      if(isNaN(amt)) continue;
      var monAbbr=['','Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][mm]||'';
      var dateStr=monAbbr+' '+dd+' '+year;
      var signed=(section==='out'||section==='checks'||section==='fees')?(-amt):amt;
      out.push(dateStr+', '+desc+', '+signed.toFixed(2));
      continue;
    }
    // Checks Paid format: "1037 ^ 03/20 1,300.00"  (check# ... MM/DD amount)
    if(section==='checks'){
      var cm=L.match(/^(\d{3,5})\b.*?(\d{2})\/(\d{2})\s+\$?([\d,]+\.\d{2})\s*$/);
      if(cm){
        var cmm=parseInt(cm[2],10), cdd=parseInt(cm[3],10);
        var camt=parseFloat(cm[4].replace(/,/g,''));
        if(!isNaN(camt)){
          var cAbbr=['','Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][cmm]||'';
          out.push(cAbbr+' '+cdd+' '+year+', Check #'+cm[1]+', '+(-camt).toFixed(2));
        }
      }
    }
  }
  return out;
}
function cleanChaseDesc(desc){
  // Shorten common Chase verbose patterns
  desc=desc.replace(/Orig CO Name:/i,'').replace(/Trace#\S+/i,'').replace(/Eed:\S+/i,'').replace(/Ind ID:\S+/i,'').replace(/Trn:\s*\S+/i,'');
  desc=desc.replace(/Desc Date:\S+/i,'').replace(/Orig ID:\S+/i,'').replace(/Sec:\S+/i,'');
  desc=desc.replace(/\s{2,}/g,' ').trim();
  // Cap length
  if(desc.length>60) desc=desc.slice(0,60).trim();
  return desc||'Transaction';
}
function doImportStatement(){
  var acct=document.getElementById('_imp_acct').value;
  var raw=document.getElementById('_imp_text').value.split('\n').filter(function(l){return l.trim();});
  if(!raw.length){ flash('Paste at least one transaction line','#D94F4F'); return; }
  var nextId=BANK_TXNS.reduce(function(m,t){return Math.max(m,t.id);},0)+1;
  var added=0;
  raw.forEach(function(line){
    var parts=line.split(',').map(function(s){return s.trim();});
    if(parts.length<3) return;
    var date=parts[0];
    var desc=parts.slice(1,parts.length-1).join(', ');
    var amtRaw=parts[parts.length-1].replace(/[$,]/g,'');
    var amt=parseFloat(amtRaw);
    if(isNaN(amt)) return;
    var dir=amt<0?'out':'in';
    var d=new Date(date); var dateStr=isNaN(d)?date:d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
    BANK_TXNS.push({id:nextId++, account:acct, date:dateStr, payee:desc, memo:'Imported', amount:Math.abs(amt), dir:dir, status:'review', ledger:'', matchType:'', matchRef:'', vendorId:null});
    added++;
  });
  document.getElementById('_importBg').remove();
  bankActiveAcct=acct; bankFilter='review';
  renderBankingView();
  flash(added+' transaction'+(added!==1?'s':'')+' imported');
}

function matchVendorChanged(){
  var vid=parseInt(document.getElementById('_m_vendor').value);

  var hint=document.getElementById('_m_acct_hint');
  if(v && v.accountName){
    // Try to preselect a ledger option that matches the vendor default account
    var match=null;
    for(var i=0;i<acctSel.options.length;i++){ if(acctSel.options[i].value.toLowerCase().indexOf(v.accountName.toLowerCase())!==-1 || v.accountName.toLowerCase().indexOf(acctSel.options[i].value.toLowerCase())!==-1){ match=acctSel.options[i].value; break; } }
    if(match){ acctSel.value=match; } 
    hint.textContent='· default: '+v.accountName+' (you can change it)';
  } else { hint.textContent=v?'· no default account set':''; }

function matchInvToggle(idx, received){
  var cb=document.getElementById('_minv_'+idx);
  var amt=document.getElementById('_mamt_'+idx);
  if(amt) amt.disabled=!cb.checked;
  matchInvSum(received);
}
function matchInvSum(received){
  var total=0, anyChecked=false, i=0;
  while(document.getElementById('_minv_'+i)){
    var cb=document.getElementById('_minv_'+i);
    if(cb.checked){
      anyChecked=true;
      var v=parseFloat((document.getElementById('_mamt_'+i).value||'').replace(/[$,]/g,''))||0;
      total+=v;
    }
    i++;
  }
  var appliedEl=document.getElementById('_m_applied');
  var diffEl=document.getElementById('_m_diff');
  var warnEl=document.getElementById('_m_warn');
  if(appliedEl) appliedEl.textContent=fmt(total);
  var diff=received-total;
  if(diffEl){ diffEl.textContent=(diff<0?'-':'')+fmt(Math.abs(diff)); diffEl.style.color=Math.abs(diff)<0.005?'#16a34a':'var(--danger)'; }
  if(warnEl){
    if(!anyChecked){ warnEl.innerHTML=''; }
    else if(Math.abs(diff)<0.005){ warnEl.innerHTML='<span style="color:#16a34a;font-weight:600;">✓ Applied amount matches the payment.</span>'; }
    else if(diff>0){ warnEl.innerHTML='<span style="color:var(--warning);">'+fmt(diff)+' of the payment is still unapplied.</span>'; }
    else { warnEl.innerHTML='<span style="color:var(--danger);">Applied amount exceeds the payment by '+fmt(-diff)+'.</span>'; }
  }
}
function bankApplyInvoiceMatch(id){
  var t=BANK_TXNS.find(function(x){return x.id===id;}); if(!t) return;
  var picks=[]; var total=0; var i=0;
  while(document.getElementById('_minv_'+i)){
    var cb=document.getElementById('_minv_'+i);
    if(cb.checked){
      var label=cb.parentNode.querySelector('div span') ? cb.parentNode.querySelector('div span').textContent : ('Invoice '+(i+1));
      var amt=parseFloat((document.getElementById('_mamt_'+i).value||'').replace(/[$,]/g,''))||0;
      picks.push({ref:label, amount:amt});
      total+=amt;
    }
    i++;
  }
  if(!picks.length){ flash('Select at least one invoice','#D94F4F'); return; }
  t.matchType='invoice';
  t.matchRef=picks.map(function(p){return p.ref;}).join(', ');
  t.appliedInvoices=picks;
  t.ledger='Accounts Receivable';
  var bg=document.getElementById('_matchBg'); if(bg) bg.remove();
  renderBankingView();
  flash('Applied to '+picks.length+' invoice'+(picks.length>1?'s':''));
}
function bankApplyVendorMatch(id){
  var t=BANK_TXNS.find(function(x){return x.id===id;}); if(!t) return;
  var vid=parseInt(document.getElementById('_m_vendor').value);
  var v=VENDORS.find(function(x){return x.id===vid;});
  var acct=document.getElementById('_m_account').value;
  var est=document.getElementById('_m_estimate').value;
  if(!v){ document.getElementById('_m_vendor').style.borderColor='var(--danger)'; return; }
  if(!acct){ document.getElementById('_m_account').style.borderColor='var(--danger)'; return; }
  t.matchType='vendor';
  t.matchRef=v.name+(est?(' · '+est):'');
  t.vendorId=vid;
  t.ledger=acct;
  t.estimate=est||'';
  var bg=document.getElementById('_matchBg'); if(bg) bg.remove();
  renderBankingView(); flash('Matched to '+v.name);
}

<script>
(function(){
  function killAutofill(root){
    var r=root||document;
    var inputs=r.querySelectorAll?r.querySelectorAll('input,textarea,select'):[];
    for(var i=0;i<inputs.length;i++){
      var el=inputs[i];
      if(el.getAttribute('data-naf')) continue;
      var type=(el.getAttribute('type')||'').toLowerCase();
      if(type==='checkbox'||type==='radio'||type==='file'||type==='hidden') continue;
      el.setAttribute('data-naf','1');
      el.setAttribute('autocomplete','new-password');
      el.setAttribute('autocorrect','off');
      el.setAttribute('autocapitalize','off');
      el.setAttribute('spellcheck','false');
      el.setAttribute('aria-autocomplete','none');
      if(!el.name || /^(name|email|phone|address|fname|lname|title|first|last)/i.test(el.name)){
        el.setAttribute('name','f_'+Math.random().toString(36).slice(2,9));
      }
    }
  }
  function start(){
    killAutofill(document);
    try{
      var obs=new MutationObserver(function(muts){
        for(var i=0;i<muts.length;i++){ var ad=muts[i].addedNodes; if(ad){ for(var j=0;j<ad.length;j++){ if(ad[j].nodeType===1) killAutofill(ad[j]); } } }
      });
      obs.observe(document.body,{childList:true,subtree:true});
    }catch(e){}
  }
  if(document.readyState==='loading'){ document.addEventListener('DOMContentLoaded', start); }
  else { start(); }
})();
</script>
