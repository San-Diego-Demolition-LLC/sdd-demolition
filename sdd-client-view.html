  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Barlow',Arial,sans-serif;background:#e8e6e0;color:#1f2630;line-height:1.5;}
  .topbar{background:#1f2630;color:#fff;padding:16px 20px;text-align:center;}
  .topbar .lock{font-size:11px;color:#9aa3af;margin-top:4px;display:flex;align-items:center;justify-content:center;gap:6px;}
  .wrap{max-width:1000px;margin:0 auto;padding:24px 16px 60px;}
  .hello{background:#fff;border-radius:14px;padding:24px 26px;margin-bottom:20px;box-shadow:0 4px 18px rgba(0,0,0,.08);border-top:4px solid #B8922A;}
  .hello h1{font-family:'Barlow Condensed',sans-serif;font-size:30px;font-weight:800;margin-bottom:4px;}
  .hello p{font-size:15px;color:#555;}
  .summary{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-bottom:22px;}
  .stat{background:#fff;border-radius:12px;padding:18px 20px;box-shadow:0 3px 12px rgba(0,0,0,.06);}
  .stat .lbl{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.05em;color:#888;margin-bottom:6px;}
  .stat .val{font-size:26px;font-weight:800;color:#1f2630;font-family:'Barlow Condensed',sans-serif;}
  .stat.gold .val{color:#B8922A;}.stat.red .val{color:#D94F4F;}.stat.green .val{color:#3A9E6A;}
  .stat .sub{font-size:12px;color:#999;margin-top:2px;}
  .section{background:#fff;border-radius:14px;padding:22px 24px;margin-bottom:20px;box-shadow:0 4px 18px rgba(0,0,0,.08);}
  .section h2{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:700;margin-bottom:4px;display:flex;align-items:center;gap:10px;}
  .section .subtitle{font-size:13px;color:#999;margin-bottom:16px;}
  .doc-row{display:flex;justify-content:space-between;align-items:center;gap:14px;padding:14px 0;border-bottom:1px solid #eee;flex-wrap:wrap;}
  .doc-row:last-child{border-bottom:none;}
  .doc-info{flex:1;min-width:200px;}
  .doc-info .name{font-size:15px;font-weight:700;color:#1f2630;}
  .doc-info .meta{font-size:13px;color:#888;margin-top:2px;}
  .doc-amt{font-size:17px;font-weight:800;color:#B8922A;white-space:nowrap;font-family:'Barlow Condensed',sans-serif;}
  .doc-actions{display:flex;gap:8px;flex-wrap:wrap;}
  .badge{font-size:11px;font-weight:700;padding:3px 10px;border-radius:999px;white-space:nowrap;}
  .badge.approved,.badge.paid,.badge.signed{background:#EAF6EF;color:#1f6b43;}
  .badge.pending{background:#FFF4E0;color:#8a6414;}
  .badge.unpaid{background:#FDECEC;color:#a33;}
  .btn{padding:9px 16px;border-radius:8px;border:none;font-family:'Barlow',sans-serif;font-size:13px;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;gap:6px;text-decoration:none;}
  .btn-gold{background:#B8922A;color:#fff;}.btn-green{background:#3A9E6A;color:#fff;}.btn-outline{background:#fff;color:#555;border:1.5px solid #ccc;}
  .empty{font-size:14px;color:#aaa;padding:14px 0;font-style:italic;}
  .foot{text-align:center;font-size:12px;color:#999;margin-top:30px;}
  .err{background:#FDECEC;border:1px solid #E5A5A5;color:#a33;padding:20px;border-radius:12px;text-align:center;font-size:15px;}
  .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:1000;display:none;align-items:flex-start;justify-content:center;padding:20px;overflow:auto;}
  .modal-bg.show{display:flex;}
  .modal{background:#fff;border-radius:14px;max-width:820px;width:100%;margin:auto;box-shadow:0 24px 64px rgba(0,0,0,.4);overflow:hidden;}
  .modal-head{background:#1f2630;color:#fff;padding:14px 20px;display:flex;justify-content:space-between;align-items:center;}
  .modal-head .x{cursor:pointer;font-size:22px;line-height:1;background:none;border:none;color:#fff;}
  .modal-body{padding:22px 24px;max-height:70vh;overflow:auto;}
  .modal-foot{padding:14px 20px;border-top:1px solid #eee;background:#fafafa;display:flex;justify-content:flex-end;gap:10px;flex-wrap:wrap;}
  .doc-head{display:flex;justify-content:space-between;border-bottom:3px solid #B8922A;padding-bottom:12px;margin-bottom:14px;flex-wrap:wrap;gap:10px;}
  .doc-head .big{font-family:'Barlow Condensed',sans-serif;font-size:40px;font-weight:800;color:#B8922A;line-height:1;}
  .co{font-size:16px;font-weight:800;}.ci{font-size:10px;color:#888;line-height:1.4;margin-top:4px;}
  .scope-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;background:#F5F4F1;border-left:3px solid #B8922A;padding:7px 10px;border-radius:5px;margin:12px 0 6px;}
  .dtable{width:100%;border-collapse:collapse;}.dtable td{padding:6px 4px;border-bottom:1px solid #eee;font-size:13px;}.dtable td.n{text-align:right;}.dtable td.u{text-align:center;}.dtable td.b{font-weight:700;}
  .dtotal{display:flex;justify-content:space-between;border-top:2px solid #B8922A;background:#F8F6F2;padding:10px 6px;font-size:16px;font-weight:800;margin-top:8px;}.dtotal .a{color:#B8922A;}
  .sigwrap{border:1.5px dashed #bbb;border-radius:8px;background:#fafafa;position:relative;margin-top:8px;}
  .sigwrap canvas{width:100%;height:150px;touch-action:none;cursor:crosshair;display:block;border-radius:8px;}
  .sighint{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#bbb;font-size:14px;pointer-events:none;}
  @media print{
    @page{size:A4;margin:0;}
    body{background:#fff!important;}
    .topbar,.hello,.summary,.section,.foot,.modal-head,.modal-foot{display:none!important;}
    .modal-bg{position:static!important;background:none!important;padding:0!important;display:block!important;overflow:visible!important;}
    .modal{box-shadow:none!important;max-width:none!important;width:auto!important;border-radius:0!important;}
    .modal-body{max-height:none!important;overflow:visible!important;padding:0!important;}
    /* The paginated A4 pages print one per sheet, at true size, no shadow/margins */
    #_pcPages{background:none!important;padding:0!important;}
    #_pcPages .page{width:210mm!important;min-height:297mm!important;margin:0!important;box-shadow:none!important;page-break-after:always;break-after:page;}
    #_pcPages .page:last-child{page-break-after:auto;break-after:auto;}
    /* Hide the signature capture area when printing */
    .sigwrap,#cvHint{display:none!important;}
  }
</style>

/* ===== A4 paginated document engine (ported from SDD system) ===== */
function _pcEsc(v){return String(v==null?'':v).replace(/&/g,'&amp;').replace(/</g,'&lt;');}
function _pcMoney(n){return '$'+Number(n||0).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});}
function _pcNum(v){return parseFloat(String(v||'').replace(/[$,]/g,''))||0;}
function _addrLine1(addr){var s=String(addr||'').trim();var i=s.indexOf(',');return i>=0?s.slice(0,i).trim():s;}
function _addrLine2(addr){var s=String(addr||'').trim();var i=s.indexOf(',');var rest=i>=0?s.slice(i+1).trim():'';if(!rest)return '';return rest.replace(/^([A-Za-z .]+?)\s+([A-Z]{2}\s+\d{5})/,'$1, $2');}
function _fullJobSite(job){if(!job)return '';if(job.address&&/,/.test(job.address))return job.address;var street=job.streetOnly||job.address||'';var city=job.city||'';return street+(city?', '+city:'');}
function _pcKindName(kind){return {estimate:'Estimate',invoice:'Invoice',co:'Change Order'}[kind]||'Document';}

function _pcHeaderHTML(f){
  var d=f.doc,c=f.cust,job=f.job;
  var CO=(window.SDD&&SDD.COMPANY)?SDD.COMPANY:{name:'San Diego Demolition, LLC',license:'1082669',address1:'5755 Oberlin Drive, Suite 301',address2:'San Diego, CA 92121',phone:'619-273-3467'};
  var logo=(typeof SDD_LOGO!=='undefined')?SDD_LOGO:'';
  var kindBig=_pcKindName(f.kind).toUpperCase();
  var numv=d.est||d.num||d.inv||'';
  var isInv=(f.kind==='invoice');
  return '<div class="hd">'
      +'<div style="max-width:55%;">'
        +(logo?'<img src="'+logo+'" style="height:52px;display:block;margin-bottom:10px;">':'')
        +'<div class="co">'+_pcEsc(CO.name)+'</div>'
        +'<div class="ci">License Number #'+_pcEsc(CO.license)+'<br>'+_pcEsc(CO.address1)+'<br>'+_pcEsc(CO.address2)+'<br>'+_pcEsc(CO.phone)+'</div>'
      +'</div>'
      +'<div style="text-align:right;"><div class="big">'+kindBig+'</div><div class="num">#'+_pcEsc(numv)+'</div>'
        +'<div style="margin-top:14px;font-size:11px;"><span class="t">Status</span> <span style="font-weight:800;color:#B8922A;font-size:13px;">'+_pcEsc(d.status||'')+'</span></div>'
      +'</div>'
    +'</div>'
    +'<div class="cols">'
      +'<div style="flex:1;"><div class="t">Customer Info</div><div class="v">'+_pcEsc(c.name)+'<br>'+_pcEsc(_addrLine1(c.address||''))+'<br>'+_pcEsc(_addrLine2(c.address||''))+'</div></div>'
      +'<div style="flex:1;"><div class="t">Job Site Address</div><div class="v">'+_pcEsc(_addrLine1(_fullJobSite(job)))+'<br>'+_pcEsc(_addrLine2(_fullJobSite(job)))+'</div></div>'
      +'<div style="flex:1;"><div class="t">'+_pcKindName(f.kind)+' Date</div><div class="v">'+_pcEsc(d.date||'')+'</div>'
        +(isInv?'':'<div class="t" style="margin-top:6px;">PO</div><div class="v">'+_pcEsc(d.po||'')+'</div>')+'</div>'
    +'</div>'
    +((d.projectName||job.projectName)?'<div style="border-top:1px solid #eee;padding-top:8px;margin-bottom:8px;"><span class="t">Project</span> <span class="v" style="font-weight:700;font-size:13px;">'+_pcEsc(d.projectName||job.projectName)+'</span></div>':'');
}

function _pcContentBlocks(f){
  var d=f.doc;
  var lines=d.lines||[];
  // Price visibility: invoices & change orders always show prices; estimates respect the document's _priceView (system default 'standard' = descriptions only)
  var showPrices;
  if(f.kind==='invoice' || f.kind==='co'){ showPrices=true; }
  else { showPrices=(d._priceView==='full'); }
  var rowHTML=function(l){
    if(showPrices){
      return '<table class="tbl"><colgroup><col style="width:auto"><col style="width:52px"><col style="width:52px"><col style="width:72px"><col style="width:82px"></colgroup>'
        +'<tr><td class="d">'+_pcEsc(l.desc)+'</td><td class="n">'+_pcEsc(l.qty)+'</td><td class="u">'+_pcEsc(l.unit)+'</td><td class="n">'+(l.unitPrice?Number(l.unitPrice).toLocaleString('en-US'):'')+'</td><td class="n b">'+_pcMoney(l.total)+'</td></tr></table>';
    }
    // Standard view: descriptions only
    return '<table class="tbl"><tr><td class="d">'+_pcEsc(l.desc)+'</td></tr></table>';
  };
  var scopeTitle=(f.kind==='invoice'?'Work Completed':'Proposed Scope of Work');
  var blocks=[];
  blocks.push({html:'<div class="scope">'+scopeTitle+'</div>'});
  lines.forEach(function(l){blocks.push({html:rowHTML(l),scopeTitle:scopeTitle});});
  // approved alternates
  var hasAlt=false;
  (d.alternates||[]).forEach(function(a){
    var approved=(a.lines||[]).filter(function(l){return l._approved||a.approved;});
    if(!approved.length)return;
    if(!hasAlt){blocks.push({html:'<div class="scope alt">Approved Alternate Work</div>'});hasAlt=true;}
    blocks.push({html:'<div class="altname">'+_pcEsc(a.name)+'</div>',scopeTitle:'Approved Alternate Work'});
    approved.forEach(function(l){blocks.push({html:rowHTML(l),scopeTitle:'Approved Alternate Work'});});
  });
  var total=lines.reduce(function(s,l){return s+(Number(l.total)||0);},0)||_pcNum(d.amount);
  blocks.push({html:'<div class="total"><span>Total</span><span class="a">'+_pcMoney(total)+'</span></div>'});
  // Terms
  if(typeof TERMS_AND_CONDITIONS!=='undefined'){
    var tkey=d.termsType||Object.keys(TERMS_AND_CONDITIONS)[0];
    var tpl=TERMS_AND_CONDITIONS[tkey];
    if(tpl){
      var items=tpl.clauses.map(function(cl){return '<div class="clause"><b>'+_pcEsc(cl.ltr)+'.</b> '+_pcEsc(cl.text)+'</div>';}).join('');
      if(items)blocks.push({html:'<div class="terms"><div class="scope">Terms &amp; Conditions</div>'+items+'</div>'});
    }
  }
  // WAIVERS (invoices only): show conditional + unconditional ONLY if job requires waivers AND invoice is fully paid
  if(f.kind==='invoice'){
    var paid=(d.payments||[]).reduce(function(s,p){return s+_pcNum(p.amount);},0);
    var bal=Math.max(0,_pcNum(d.amount)-paid);
    var requiresWaivers=(f.job&&(f.job.requiresWaivers===true||f.job.requireWaivers===true||f.job.waivers===true||f.job.waiverRequired===true));
    if(requiresWaivers && bal<=0.5){
      blocks.push({html:'<div class="scope">Conditional Waiver and Release</div><div class="waiver">'+(window._WAIVER_CONDITIONAL||'[Conditional waiver text will appear here once provided.]')+'</div>'});
      blocks.push({html:'<div class="scope">Unconditional Waiver and Release</div><div class="waiver">'+(window._WAIVER_UNCONDITIONAL||'[Unconditional waiver text will appear here once provided.]')+'</div>'});
    }
  }
  // Signature block (estimates only)
  if(f.kind==='estimate'){
    var ap=(typeof loadApproval==='function')?loadApproval(d.est||d.num):null;
    var sigHTML='<div class="sigblock" style="margin-top:20px;border:1.5px solid #ddd;border-radius:10px;padding:16px;">'
      +'<div style="font-size:13px;font-weight:800;color:#1f2630;text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px;">Client Signature</div>'
      +'<div style="font-size:12px;color:#555;line-height:1.5;margin-bottom:12px;font-style:italic;">By signing this document, you accept the terms and conditions stated in this estimate.</div>';
    if(ap&&ap.image){sigHTML+='<img src="'+ap.image+'" style="max-height:80px;display:block;margin-bottom:2px;"><div style="border-top:1px solid #333;padding-top:4px;width:280px;font-size:13px;">'+_pcEsc(ap.name||'')+' — '+_pcEsc(ap.date||'')+'</div>';}
    else{sigHTML+='<div style="font-size:13px;color:#888;">Use the "Sign" button on the portal to approve this estimate.</div>';}
    sigHTML+='</div>';
    blocks.push({html:sigHTML});
  }
  return blocks;
}

function _pcPageCSS(){
  return '#_pcPages .page{width:210mm;min-height:297mm;background:#fff;margin:0 auto 20px;padding:16mm;box-shadow:0 4px 18px rgba(0,0,0,.15);display:flex;flex-direction:column;box-sizing:border-box;font-family:Barlow,Arial,sans-serif;color:#1f2630;}'
    +'#_pcPages .pagebody{flex:1;}#_pcPages .pfoot{text-align:center;font-size:10px;color:#999;padding-top:8px;border-top:1px solid #eee;margin-top:10px;}'
    +'#_pcPages .hd{display:flex;justify-content:space-between;border-bottom:3px solid #B8922A;padding-bottom:12px;margin-bottom:14px;}#_pcPages .co{font-size:18px;font-weight:800;}#_pcPages .ci{font-size:10px;color:#888;line-height:1.4;margin-top:4px;}#_pcPages .big{font-family:"Barlow Condensed",Barlow,sans-serif;font-size:48px;font-weight:800;color:#B8922A;text-align:right;line-height:1;letter-spacing:.03em;}#_pcPages .num{font-size:16px;font-weight:800;color:#555;text-align:right;margin-top:4px;}'
    +'#_pcPages .cols{display:flex;justify-content:space-between;gap:20px;margin-bottom:8px;}#_pcPages .cols .t{font-size:10px;font-weight:800;color:#666;text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px;}#_pcPages .cols .v{font-size:12px;color:#555;}#_pcPages .t{font-size:10px;font-weight:800;color:#666;text-transform:uppercase;letter-spacing:.05em;}#_pcPages .v{font-size:12px;color:#555;}'
    +'#_pcPages .scope{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;background:#F5F4F1;border-left:3px solid #B8922A;padding:7px 10px;border-radius:5px;margin:6px 0;}'
    +'#_pcPages .tbl{width:100%;border-collapse:collapse;table-layout:fixed;}#_pcPages .tbl td{padding:5px 4px;border-bottom:1px solid #eee;font-size:12px;overflow:hidden;text-overflow:ellipsis;}#_pcPages .tbl td.d{white-space:normal;word-wrap:break-word;}#_pcPages .tbl td.n{text-align:right;}#_pcPages .tbl td.u{text-align:center;}#_pcPages .tbl td.b{font-weight:700;}'
    +'#_pcPages .altname{font-weight:700;color:#B8922A;padding:8px 4px 2px;font-size:11px;text-transform:uppercase;letter-spacing:.04em;}'
    +'#_pcPages .total{display:flex;justify-content:space-between;border-top:2px solid #B8922A;background:#F8F6F2;padding:10px 6px;font-size:16px;font-weight:800;margin-top:8px;}#_pcPages .total .a{color:#B8922A;}'
    +'#_pcPages .terms{margin-top:8px;}#_pcPages .terms .clause{font-size:10px;color:#555;margin-bottom:6px;line-height:1.45;}'
    +'#_pcPages .waiver{font-size:11px;color:#555;line-height:1.5;white-space:pre-wrap;margin-bottom:8px;}';
}

function _pcBuildPages(f, containerId, measureId){
  if(!document.getElementById('_pcPageCSS')){var st=document.createElement('style');st.id='_pcPageCSS';st.textContent=_pcPageCSS();document.head.appendChild(st);}
  var header=_pcHeaderHTML(f);
  var blocks=_pcContentBlocks(f);
  var measure=document.getElementById(measureId);
  function mh(html){measure.innerHTML=html;return measure.scrollHeight;}
  var PX=3.7795;
  var CONTENT_H=(297-2*16)*PX-48;
  var headerH=mh(header);
  var avail=CONTENT_H-headerH;
  var pages=[],cur=[],curH=0;
  function push(){pages.push(cur);cur=[];curH=0;}
  for(var i=0;i<blocks.length;i++){var h=mh(blocks[i].html);if(curH+h>avail&&cur.length){push();}cur.push(blocks[i]);curH+=h;}
  if(cur.length)push();
  if(!pages.length)pages.push([]);
  var N=pages.length,out='';
  for(var p=0;p<N;p++){
    var ph=pages[p].map(function(b){return b.html;}).join('');
    if(p<N-1){var lb=pages[p][pages[p].length-1];var nf=pages[p+1][0];if(lb&&nf&&lb.scopeTitle&&nf.scopeTitle===lb.scopeTitle){ph+='<div style="text-align:right;font-size:10px;color:#999;font-style:italic;margin-top:6px;">'+lb.scopeTitle+' continued on next page…</div>';}}
    out+='<div class="page"><div class="pagebody">'+header+ph+'</div><div class="pfoot">Page '+(p+1)+' of '+N+'</div></div>';
  }
  var pc=document.getElementById(containerId);if(pc)pc.innerHTML=out;
}

<script src="sdd-data.js"></script>
<script>
(function(){
  if(!window.SDD && window._SDD_EMBED){ window.SDD=window._SDD_EMBED; }
  var APPROVAL_KEY='sdd_client_approvals';
  function money(n){return '$'+Number(n||0).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});}
  function esc(v){return String(v==null?'':v).replace(/&/g,'&amp;').replace(/</g,'&lt;');}
  function num(v){return parseFloat(String(v||'').replace(/[$,]/g,''))||0;}
  function getParam(k){var m=new RegExp('[?&]'+k+'=([^&]+)').exec(location.search);return m?decodeURIComponent(m[1]):'';}
  function loadApproval(id){try{var a=JSON.parse(localStorage.getItem(APPROVAL_KEY)||'{}');return a[id]||null;}catch(e){return null;}}
  function saveApproval(id,o){var a={};try{a=JSON.parse(localStorage.getItem(APPROVAL_KEY)||'{}');}catch(e){}a[id]=o;localStorage.setItem(APPROVAL_KEY,JSON.stringify(a));}
  var CO=(window.SDD&&SDD.COMPANY)?SDD.COMPANY:{name:'San Diego Demolition, LLC',license:'1082669',address1:'5755 Oberlin Drive, Suite 301',address2:'San Diego, CA 92121',phone:'619-273-3467',email:'info@sandiegodemolition.com'};

  function gatherClient(idOrName){
    if(!window.SDD || !SDD.customers) return null;
    var c=SDD.customers.filter(function(x){return String(x.id)===String(idOrName)||x.name===idOrName;})[0];
    if(!c) return null;
    var estimates=[],changeOrders=[],invoices=[];
    (c.contacts||[]).forEach(function(ct){(ct.jobs||[]).forEach(function(job){
      (job.estimates||[]).forEach(function(e){estimates.push({doc:e,job:job});});
      (job.changeOrders||[]).forEach(function(co){changeOrders.push({doc:co,job:job});});
      (job.invoices||[]).forEach(function(iv){invoices.push({doc:iv,job:job});});
    });});
    return {cust:c,estimates:estimates,changeOrders:changeOrders,invoices:invoices};
  }
  var CLIENT=null;

  // Demo helper: when opened without ?client=, let the tester pick a customer
  function renderClientPicker(){
    var root=document.getElementById('root');
    if(!window.SDD || !SDD.customers || !SDD.customers.length){
      root.innerHTML='<div class="err">No customer data available.</div>'; return;
    }
    var rows=SDD.customers.map(function(c){
      // count docs
      var ne=0,nc=0,ni=0;
      (c.contacts||[]).forEach(function(ct){(ct.jobs||[]).forEach(function(j){ne+=(j.estimates||[]).length;nc+=(j.changeOrders||[]).length;ni+=(j.invoices||[]).length;});});
      return '<div class="doc-row"><div class="doc-info"><div class="name">'+esc(c.name)+'</div><div class="meta">'+ne+' estimates · '+nc+' change orders · '+ni+' invoices</div></div>'
        +'<div class="doc-actions"><a class="btn btn-gold" href="?client='+encodeURIComponent(c.id)+'">Open portal</a></div></div>';
    }).join('');
    root.innerHTML='<div class="hello"><h1>Client Portal — Demo</h1><p>This screen only appears when the portal is opened without a client link. In real use, each client gets their own secure link. Pick a client below to preview their portal.</p></div>'
      +'<div class="section"><h2>Select a client</h2><div class="subtitle">For testing — choose whose portal to view.</div>'+rows+'</div>';
  }

  function render(){
    var key=getParam('client')||getParam('est');
    var root=document.getElementById('root');
    if(!key){ renderClientPicker(); return; }
    var data=gatherClient(key);
    if(!data){
      var found=null;
      (SDD.customers||[]).forEach(function(c){(c.contacts||[]).forEach(function(ct){(ct.jobs||[]).forEach(function(j){(j.estimates||[]).forEach(function(e){if(e.est===key)found=c;});});});});
      if(found) data=gatherClient(found.id);
    }
    if(!data){root.innerHTML='<div class="err">We couldn\'t find your records. Please contact us for a new link.</div>';return;}
    CLIENT=data;

    var pendingSign=data.estimates.filter(function(e){return !loadApproval(e.doc.est) && !/void/i.test(e.doc.status||'');}).length;
    var estTotal=data.estimates.reduce(function(s,e){return s+num(e.doc.amount);},0);
    var invUnpaid=0,invCount=data.invoices.length;
    data.invoices.forEach(function(iv){var total=num(iv.doc.amount);var paid=(iv.doc.payments||[]).reduce(function(s,p){return s+num(p.amount);},0);invUnpaid+=Math.max(0,total-paid);});

    var html='<div class="hello"><h1>Welcome, '+esc(data.cust.name)+'</h1><p>Here are all your documents with San Diego Demolition, LLC. Review, download, sign what\'s pending, and check your balances.</p></div>';
    html+='<div class="summary">'
      +'<div class="stat gold"><div class="lbl">Estimates</div><div class="val">'+data.estimates.length+'</div><div class="sub">'+money(estTotal)+' total</div></div>'
      +'<div class="stat '+(pendingSign>0?'red':'green')+'"><div class="lbl">Awaiting your signature</div><div class="val">'+pendingSign+'</div><div class="sub">'+(pendingSign>0?'action needed':'all signed')+'</div></div>'
      +'<div class="stat"><div class="lbl">Change Orders</div><div class="val">'+data.changeOrders.length+'</div></div>'
      +'<div class="stat '+(invUnpaid>0.5?'red':'green')+'"><div class="lbl">Balance due</div><div class="val">'+money(invUnpaid)+'</div><div class="sub">'+invCount+' invoice'+(invCount===1?'':'s')+'</div></div>'
    +'</div>';

    html+='<div class="section"><h2><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#B8922A" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>Estimates</h2><div class="subtitle">Your project estimates. Sign the ones awaiting your approval.</div>';
    if(!data.estimates.length){html+='<div class="empty">No estimates yet.</div>';}
    data.estimates.forEach(function(e,i){
      var ap=loadApproval(e.doc.est);var isVoid=/void/i.test(e.doc.status||'');
      var badge=isVoid?'<span class="badge unpaid">Void</span>':(ap?'<span class="badge signed">Signed</span>':'<span class="badge pending">Awaiting signature</span>');
      html+='<div class="doc-row"><div class="doc-info"><div class="name">'+esc(e.doc.est)+' · '+esc(e.job.jobName||e.doc.scope||'Estimate')+'</div><div class="meta">'+esc(e.doc.date||'')+' · '+esc(e.job.projectName||'')+'</div></div>'
        +'<div style="text-align:right;"><div class="doc-amt">'+esc(e.doc.amount||'')+'</div>'+badge+'</div>'
        +'<div class="doc-actions"><button class="btn btn-outline" onclick="window._openDoc(\'est\','+i+')">View</button>'
        +((!ap&&!isVoid)?'<button class="btn btn-green" onclick="window._openDoc(\'est\','+i+',true)">Sign</button>':'')+'</div></div>';
    });
    html+='</div>';

    html+='<div class="section"><h2><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#B8922A" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>Change Orders</h2><div class="subtitle">Changes to the original scope of your projects.</div>';
    if(!data.changeOrders.length){html+='<div class="empty">No change orders.</div>';}
    data.changeOrders.forEach(function(co,i){
      html+='<div class="doc-row"><div class="doc-info"><div class="name">'+esc(co.doc.num||co.doc.co||'Change Order')+' · '+esc(co.job.jobName||'')+'</div><div class="meta">'+esc(co.doc.date||'')+'</div></div>'
        +'<div style="text-align:right;"><div class="doc-amt">'+esc(co.doc.amount||'')+'</div><span class="badge pending">'+esc(co.doc.status||'')+'</span></div>'
        +'<div class="doc-actions"><button class="btn btn-outline" onclick="window._openDoc(\'co\','+i+')">View</button></div></div>';
    });
    html+='</div>';

    html+='<div class="section"><h2><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#B8922A" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="8" y1="10" x2="16" y2="10"/><line x1="8" y1="14" x2="16" y2="14"/></svg>Invoices</h2><div class="subtitle">Your invoices and payment status.</div>';
    if(!data.invoices.length){html+='<div class="empty">No invoices yet.</div>';}
    data.invoices.forEach(function(iv,i){
      var total=num(iv.doc.amount);var paid=(iv.doc.payments||[]).reduce(function(s,p){return s+num(p.amount);},0);var bal=Math.max(0,total-paid);var paidUp=bal<=0.5;
      var badge=paidUp?'<span class="badge paid">Paid</span>':(paid>0.5?'<span class="badge unpaid">Balance '+money(bal)+'</span>':'<span class="badge unpaid">Unpaid</span>');
      html+='<div class="doc-row"><div class="doc-info"><div class="name">'+esc(iv.doc.num||iv.doc.inv||'Invoice')+' · '+esc(iv.job.jobName||'')+'</div><div class="meta">'+esc(iv.doc.date||'')+(iv.doc.dueDate?(' · Due '+esc(iv.doc.dueDate)):'')+'</div></div>'
        +'<div style="text-align:right;"><div class="doc-amt">'+esc(iv.doc.amount||'')+'</div>'+badge+'</div>'
        +'<div class="doc-actions"><button class="btn btn-outline" onclick="window._openDoc(\'inv\','+i+')">View</button></div></div>';
    });
    html+='</div>';

    html+='<div class="foot">This is a secure client portal. You can only see your own documents — no other account information is accessible.<br>Questions? Contact us at '+esc(CO.phone)+(CO.email?' · '+esc(CO.email):'')+'</div>';
    root.innerHTML=html;
  }

  function docKindWord(kind){return kind==='inv'?'INVOICE':(kind==='co'?'CHANGE ORDER':'ESTIMATE');}
  window._openDoc=function(kind,idx){
    var arr=kind==='est'?CLIENT.estimates:(kind==='co'?CLIENT.changeOrders:CLIENT.invoices);
    var item=arr[idx];if(!item)return;
    var d=item.doc,job=item.job;
    var estId=d.est||d.num||d.inv;
    var ap=(kind==='est')?loadApproval(estId):null;
    var canSign=(kind==='est')&&!ap&&!/void/i.test(d.status||'');
    // Map portal kind → engine kind
    var ekind=(kind==='inv')?'invoice':(kind==='co'?'co':'estimate');
    var f={doc:d,job:job,cust:CLIENT.cust,kind:ekind};

    // A4 paginated document + hidden measuring div
    var body='<div id="_pcPages" style="background:#e8e6e0;padding:16px;border-radius:8px;"></div>'
      +'<div id="_pcMeasure" style="position:absolute;visibility:hidden;width:178mm;left:-9999px;top:0;"></div>';

    // Signature area (for pending estimates) shown below the document
    if(canSign){
      body+='<div style="margin-top:16px;border:1.5px solid #ddd;border-radius:10px;padding:16px;background:#fff;"><div style="font-size:12px;font-weight:800;color:#666;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px;">Your Signature</div>'
        +'<p style="font-size:12px;color:#555;font-style:italic;margin-bottom:8px;">By signing below, you accept the terms and conditions stated in this estimate and approve the work described above.</p>'
        +'<div class="sigwrap"><canvas id="cvSig" width="820" height="150"></canvas><div class="sighint" id="cvHint">Sign here with your mouse or finger</div></div>'
        +'<div style="display:flex;gap:10px;margin-top:8px;flex-wrap:wrap;"><input id="sigName" placeholder="Type your full name" style="flex:1;min-width:180px;font-family:Barlow,sans-serif;font-size:15px;padding:9px 11px;border:1px solid #ccc;border-radius:8px;"><button class="btn btn-outline" onclick="window._clearSig()">Clear</button></div></div>';
    }

    var foot='<button class="btn btn-outline" onclick="window._closeModal()">Close</button>'
      +'<button class="btn btn-gold" onclick="window.print()">Download / Print</button>'
      +(canSign?'<button class="btn btn-green" onclick="window._signDoc(\''+esc(estId)+'\')">Approve &amp; sign</button>':'');
    document.getElementById('modalInner').innerHTML='<div class="modal-head"><span style="font-weight:700;">'+docKindWord(kind)+' #'+esc(estId)+'</span><button class="x" onclick="window._closeModal()">&times;</button></div><div class="modal-body">'+body+'</div><div class="modal-foot">'+foot+'</div>';
    document.getElementById('modalBg').classList.add('show');
    // Build A4 pages (fonts may still be loading; rebuild after ready)
    _pcBuildPages(f,'_pcPages','_pcMeasure');
    if(document.fonts&&document.fonts.ready){document.fonts.ready.then(function(){_pcBuildPages(f,'_pcPages','_pcMeasure');});}
    if(canSign){initSigCanvas();}
  };
  window._closeModal=function(){document.getElementById('modalBg').classList.remove('show');};

  var _drawing=false,_hasInk=false;
  function initSigCanvas(){
    var cv=document.getElementById('cvSig');if(!cv)return;
    var ctx=cv.getContext('2d');ctx.lineWidth=2.2;ctx.lineCap='round';ctx.lineJoin='round';ctx.strokeStyle='#1f2630';_hasInk=false;
    function pos(e){var r=cv.getBoundingClientRect();var x=(e.touches?e.touches[0].clientX:e.clientX)-r.left;var y=(e.touches?e.touches[0].clientY:e.clientY)-r.top;return{x:x*(cv.width/r.width),y:y*(cv.height/r.height)};}
    function start(e){e.preventDefault();_drawing=true;var p=pos(e);ctx.beginPath();ctx.moveTo(p.x,p.y);var h=document.getElementById('cvHint');if(h)h.style.display='none';}
    function move(e){if(!_drawing)return;e.preventDefault();var p=pos(e);ctx.lineTo(p.x,p.y);ctx.stroke();_hasInk=true;}
    function end(){_drawing=false;}
    cv.onmousedown=start;cv.onmousemove=move;cv.onmouseup=end;cv.onmouseleave=end;cv.ontouchstart=start;cv.ontouchmove=move;cv.ontouchend=end;
  }
  window._clearSig=function(){var cv=document.getElementById('cvSig');if(!cv)return;cv.getContext('2d').clearRect(0,0,cv.width,cv.height);_hasInk=false;var h=document.getElementById('cvHint');if(h)h.style.display='flex';};
  window._signDoc=function(estId){
    var cv=document.getElementById('cvSig'),nameEl=document.getElementById('sigName');
    var name=nameEl?String(nameEl.value||'').trim():'';
    if(!_hasInk){alert('Please sign in the box before approving.');return;}
    if(!name){alert('Please type your full name.');if(nameEl)nameEl.focus();return;}
    var today=new Date().toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'});
    saveApproval(estId,{name:name,image:(cv?cv.toDataURL('image/png'):''),date:today,approvedAt:new Date().toISOString(),status:'approved'});
    window._closeModal();render();
    alert('Thank you! Your estimate has been approved and signed. Our team has been notified.');
  };
  render();
})();
</script>
</body>
</html>
