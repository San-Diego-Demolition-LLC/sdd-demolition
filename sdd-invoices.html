<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SDD — Invoices</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600&family=Barlow+Condensed:wght@600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --gold:#B8922A;--gold-light:#C9A84C;--gold-dim:rgba(184,146,42,0.12);--gold-dim2:rgba(184,146,42,0.07);
  --black:#1A1A1A;--surface:#FFFFFF;--surface2:#F5F4F1;--surface3:#ECEAE5;
  --border:rgba(0,0,0,0.08);--border2:rgba(0,0,0,0.14);
  --text:#1A1A1A;--muted:#777;--muted2:#AAA;
  --danger:#D94F4F;--success:#3A9E6A;--warning:#C8822A;--info:#3A7ED4;
}
body{background:#F0EEE9;color:var(--text);font-family:'Barlow',sans-serif;font-size:14px;min-height:100vh;display:flex;flex-direction:column;}

/* HEADER */
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;position:sticky;top:0;z-index:100;}
.logo{display:flex;align-items:center;gap:12px;}
.logo-svg .s-bar{fill:var(--gold);}.logo-svg .letters{fill:#1A1A1A;}
.logo-text{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:600;letter-spacing:.12em;color:var(--muted);text-transform:uppercase;}
.nav{display:flex;gap:4px;}
.nav-item{padding:6px 14px;border-radius:6px;font-size:13px;color:var(--muted);cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:7px;text-decoration:none;}
.nav-item:hover{background:var(--surface2);color:var(--text);}
.nav-item.active{background:var(--gold-dim);color:var(--gold);}
.nav-item svg{width:15px;height:15px;opacity:.7;}
.btn{padding:7px 16px;border-radius:6px;font-size:13px;font-family:'Barlow',sans-serif;cursor:pointer;transition:all .15s;border:none;display:inline-flex;align-items:center;gap:6px;}
.btn-gold{background:var(--gold);color:#fff;font-weight:600;}
.btn-gold:hover{background:var(--gold-light);}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border2);}
.btn-ghost:hover{background:var(--surface2);color:var(--text);}
.btn-sm{padding:5px 12px;font-size:12px;}
.btn-success{background:rgba(58,158,106,.12);color:var(--success);border:1px solid rgba(58,158,106,.25);}
.btn-danger{background:rgba(217,79,79,.1);color:var(--danger);border:1px solid rgba(217,79,79,.2);}
.btn-info{background:rgba(58,126,212,.1);color:var(--info);border:1px solid rgba(58,126,212,.2);}

/* LAYOUT */
.app{display:flex;flex:1;overflow:hidden;height:calc(100vh - 56px);}

/* LEFT */
.panel-left{width:310px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
.panel-left-header{padding:14px 16px;border-bottom:1px solid var(--border);}
.search-box{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:8px 12px;display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.search-box input{background:none;border:none;outline:none;color:var(--text);font-family:'Barlow',sans-serif;font-size:13px;flex:1;}
.search-box input::placeholder{color:var(--muted2);}
.inv-list{overflow-y:auto;flex:1;}
.inv-list::-webkit-scrollbar{width:4px;}
.inv-list::-webkit-scrollbar-thumb{background:var(--surface3);border-radius:2px;}

/* GROUP HEADERS */
.group-hdr{padding:10px 16px 5px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--surface);z-index:2;border-bottom:1px solid var(--border);}
.group-label{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;display:flex;align-items:center;gap:7px;}
.group-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.group-count{font-size:10px;padding:1px 7px;border-radius:20px;background:var(--surface3);color:var(--muted);}
.group-amt{font-size:11px;font-weight:600;color:var(--muted);}

/* INVOICE LIST ITEM */
.inv-item{padding:13px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:all .15s;}
.inv-item:hover{background:var(--surface2);}
.inv-item.active{background:var(--gold-dim2);border-left:2px solid var(--gold);}
.ii-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:3px;}
.ii-num{font-size:10px;font-weight:700;letter-spacing:.05em;color:var(--muted);}
.ii-amt{font-size:13px;font-weight:700;color:var(--text);}
.ii-customer{font-size:13px;font-weight:600;color:var(--text);margin-bottom:2px;}
.ii-addr{font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ii-bottom{display:flex;justify-content:space-between;margin-top:7px;align-items:center;}
.ii-date{font-size:11px;color:var(--muted2);}
.ii-balance{font-size:11px;font-weight:600;}

/* PILLS */
.pill{font-size:10px;padding:2px 9px;border-radius:20px;font-weight:600;white-space:nowrap;}
.pill-draft{background:var(--surface3);color:var(--muted);}
.pill-sent{background:rgba(58,126,212,.12);color:var(--info);}
.pill-partial{background:rgba(200,130,42,.12);color:var(--warning);}
.pill-paid{background:rgba(58,158,106,.12);color:var(--success);}
.pill-overdue{background:rgba(217,79,79,.12);color:var(--danger);}

/* RIGHT */
.panel-right{flex:1;overflow-y:auto;background:#F0EEE9;}
.panel-right::-webkit-scrollbar{width:6px;}
.panel-right::-webkit-scrollbar-thumb{background:var(--surface3);border-radius:3px;}
.empty-state{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;color:var(--muted);}
.empty-state svg{width:40px;height:40px;opacity:.25;}

/* DETAIL */
.detail-wrap{padding:24px 28px;}
.card{background:var(--surface);border-radius:12px;padding:20px 24px;margin-bottom:16px;}
.card-title{font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);margin-bottom:14px;display:flex;justify-content:space-between;align-items:center;}

/* INVOICE HEADER CARD */
.inv-header-card{background:var(--surface);border-radius:12px;padding:24px;margin-bottom:16px;}
.ih-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px;}
.ih-num{font-size:11px;font-weight:700;letter-spacing:.08em;color:var(--muted);text-transform:uppercase;margin-bottom:4px;}
.ih-customer{font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:700;}
.ih-meta{display:flex;gap:16px;flex-wrap:wrap;margin-top:6px;font-size:12px;color:var(--muted);}
.ih-meta span{display:flex;align-items:center;gap:4px;}
.ih-actions{display:flex;gap:8px;flex-wrap:wrap;align-items:flex-start;}

/* REFERENCE ROW */
.ref-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;padding:16px 0;border-top:1px solid var(--border);border-bottom:1px solid var(--border);margin-bottom:20px;}
.ref-box{}
.ref-label{font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--muted2);margin-bottom:4px;}
.ref-val{font-size:13px;font-weight:600;color:var(--text);}
.ref-val.po{color:var(--info);}
.ref-val.highlight{color:var(--gold);}

/* LINE ITEMS */
table{width:100%;border-collapse:collapse;font-size:13px;table-layout:fixed;}
th{text-align:left;color:var(--muted);font-weight:600;font-size:11px;letter-spacing:.04em;padding:7px 8px;border-bottom:1px solid var(--border);}
td{padding:9px 8px;border-bottom:1px solid var(--border);color:var(--text);vertical-align:middle;}
tr:last-child td{border-bottom:none;}
.col-desc{width:44%;}
.col-qty{width:10%;text-align:right;}
.col-unit{width:10%;text-align:right;color:var(--muted);}
.col-price{width:14%;text-align:right;}
.col-total{width:14%;text-align:right;font-weight:600;}
.alt-tag{font-size:10px;padding:1px 7px;border-radius:20px;background:rgba(184,146,42,.1);color:var(--gold);font-weight:600;margin-left:6px;}
.iv-edit{border:1px solid transparent;border-radius:4px;background:transparent;font-family:inherit;font-size:inherit;color:inherit;font-weight:inherit;padding:2px 5px;transition:all .12s;outline:none;width:100%;box-sizing:border-box;}
.iv-edit:hover{background:#FAF8F3;border-color:#EFE6D0;}
.iv-edit:focus{background:#fff;border-color:var(--gold);box-shadow:0 0 0 2px rgba(184,146,42,.12);}
.iv-edit.iv-num{text-align:right;}
.es-iconbtn{border:none;background:none;cursor:pointer;padding:3px;border-radius:6px;color:#888;vertical-align:middle;transition:all .12s;}
.es-iconbtn:hover{background:#F0EAD8;color:var(--gold);}
.es-iconbtn-del:hover{background:rgba(217,79,79,.12);color:#D94F4F;}

/* TOTALS */
.totals-box{background:var(--surface2);border-radius:8px;padding:16px 18px;margin-top:12px;}
.tot-row{display:flex;justify-content:space-between;font-size:13px;padding:4px 0;color:var(--muted);}
.tot-row.grand{font-size:17px;font-weight:700;color:var(--text);padding-top:12px;margin-top:8px;border-top:1px solid var(--border2);}
.tot-row.paid-line{color:var(--success);}
.tot-row.balance-line{font-size:15px;font-weight:700;color:var(--danger);}

/* PAYMENT PROGRESS */
.pay-bar-wrap{margin:14px 0 6px;}
.pay-bar-track{height:8px;border-radius:4px;background:var(--surface3);overflow:hidden;}
.pay-bar-fill{height:100%;border-radius:4px;background:var(--success);transition:width .4s;}
.pay-pct{font-size:11px;color:var(--muted);margin-top:5px;}

/* PAYMENT HISTORY */
.pay-row{display:flex;align-items:center;gap:14px;padding:11px 0;border-bottom:1px solid var(--border);}
.pay-row:last-child{border-bottom:none;}
.pay-icon{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.pi-card{background:rgba(58,126,212,.1);color:var(--info);}
.pi-ach{background:rgba(58,158,106,.1);color:var(--success);}
.pi-check{background:rgba(200,130,42,.1);color:var(--warning);}
.pay-info{flex:1;}
.pay-method{font-size:13px;font-weight:600;}
.pay-meta{font-size:11px;color:var(--muted);margin-top:1px;}
.pay-amt{font-size:14px;font-weight:700;color:var(--success);}

/* WAIVER SECTION */
.waiver-row{display:flex;align-items:center;gap:14px;padding:12px 16px;border-radius:8px;margin-bottom:8px;}
.waiver-row.conditional{background:rgba(200,130,42,.08);border:1px solid rgba(200,130,42,.2);}
.waiver-row.unconditional{background:rgba(58,158,106,.08);border:1px solid rgba(58,158,106,.2);}
.waiver-row.pending{background:var(--surface2);border:1px solid var(--border2);}
.waiver-icon{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.wi-cond{background:rgba(200,130,42,.15);color:var(--warning);}
.wi-uncond{background:rgba(58,158,106,.15);color:var(--success);}
.wi-pending{background:var(--surface3);color:var(--muted);}
.waiver-info{flex:1;}
.waiver-title{font-size:13px;font-weight:600;}
.waiver-sub{font-size:11px;color:var(--muted);margin-top:2px;}

/* STAT CARDS */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px;}
.stat-card{background:var(--surface);border-radius:10px;padding:14px 16px;}
.stat-label{font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--muted2);margin-bottom:6px;}
.stat-val{font-size:21px;font-weight:700;color:var(--text);}
.stat-sub{font-size:11px;color:var(--muted);margin-top:3px;}

/* INFO GRID */
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.info-box{background:var(--surface2);border-radius:8px;padding:11px 14px;}
.info-label{font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--muted2);margin-bottom:5px;}
.info-val{font-size:13px;font-weight:600;color:var(--text);}
.info-sub{font-size:11px;color:var(--muted);margin-top:2px;}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:200;align-items:center;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:var(--surface);border-radius:16px;width:500px;overflow:hidden;}
.modal-header{padding:18px 22px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
.modal-body{padding:22px;}
.modal-footer{padding:14px 22px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px;background:var(--surface2);}
.form-field{display:flex;flex-direction:column;gap:5px;margin-bottom:14px;}
.form-field label{font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);}
.form-field input,.form-field select,.form-field textarea{background:var(--surface2);border:1px solid var(--border2);border-radius:8px;padding:9px 12px;font-family:'Barlow',sans-serif;font-size:13px;color:var(--text);outline:none;transition:border .15s;}
.form-field input:focus,.form-field select:focus{border-color:var(--gold);}
.form-grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}

/* INVOICE PREVIEW */
.preview-overlay{display:none;position:fixed;inset:0;background:rgba(240,238,233,.97);z-index:300;overflow-y:auto;}
.preview-overlay.open{display:block;}
.preview-header{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 32px;display:flex;align-items:center;justify-content:space-between;}
.preview-body{max-width:760px;margin:0 auto;padding:32px 20px;}
.preview-doc{background:var(--surface);border-radius:12px;padding:40px 44px;border:1px solid var(--border);}

svg{display:block;}

/* ── RESPONSIVE ── */
@media (max-width: 768px){
  .header{padding:0 14px;height:52px;}
  .nav{display:none;}
  .logo-text{display:none;}
  .app{flex-direction:column;height:auto;overflow:visible;}
  .panel-left,.panel-right{width:100%;height:auto;border-right:none;}
  body{font-size:15px;}
  .btn{font-size:14px;padding:8px 14px;}
  .btn-sm{font-size:12px;padding:6px 12px;}
  .detail-wrap{padding:14px 16px;}
  .card{padding:16px 16px;}
  table{font-size:13px;}
  .form-overlay,.modal-overlay{padding:0;align-items:flex-end;}
  .form-modal,.nc-modal,.modal{border-radius:16px 16px 0 0;max-width:100%;max-height:92vh;}
  .form-body,.nc-body,.modal-body{max-height:calc(92vh - 140px);}
  .info-grid,.info-grid-3{grid-template-columns:1fr;}
  .form-grid,.fg2,.form-grid-3,.fg3,.form-grid-2{grid-template-columns:1fr;}
  .stats-row,.kpi-grid,.content-grid,.content-grid-3{grid-template-columns:1fr 1fr;}
  .pipeline-row{grid-template-columns:repeat(3,1fr);}
  body{padding-bottom:72px;}
}
@media (min-width:769px) and (max-width:1024px){
  .panel-left{width:260px;}
  .form-modal{max-width:640px;}
}
@media (max-width:768px){
  .mobile-nav{display:flex;position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);z-index:200;padding:8px 0 12px;}
  .mobile-nav a{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;font-size:10px;font-weight:600;color:var(--muted);text-decoration:none;padding:4px 0;letter-spacing:.02em;}
  .mobile-nav a.active{color:var(--gold);}
  .mobile-nav svg{width:22px;height:22px;}
}
@media (min-width:769px){.mobile-nav{display:none;}}


/* ── PDF PREVIEW ── */
.pdf-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:500;align-items:flex-start;justify-content:center;padding:20px;overflow-y:auto;}
.pdf-overlay.open{display:flex;}
.pdf-modal{background:#E8E8E8;border-radius:12px;width:100%;max-width:760px;overflow:hidden;box-shadow:0 24px 64px rgba(0,0,0,.3);}
.pdf-toolbar{background:#3C3C3C;padding:12px 20px;display:flex;align-items:center;justify-content:space-between;}
.pdf-toolbar-title{color:#fff;font-size:13px;font-weight:600;display:flex;align-items:center;gap:8px;}
.pdf-page{background:#fff;margin:16px auto;width:680px;min-height:820px;padding:48px 52px;box-shadow:0 4px 20px rgba(0,0,0,.15);font-family:'Barlow',sans-serif;}
.pdf-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:28px;padding-bottom:18px;border-bottom:3px solid #B8922A;}
.pdf-logo-txt{font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:700;color:#1A1A1A;}
.pdf-logo-sub{font-size:12px;color:#777;margin-top:2px;}
.pdf-doc-label{font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:700;color:#B8922A;text-align:right;}
.pdf-doc-num{font-size:15px;color:#444;margin-top:4px;text-align:right;}
.pdf-bill-row{display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-bottom:18px;}
.pdf-bill-lbl{font-size:10px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:#777;margin-bottom:5px;}
.pdf-bill-val{font-size:13px;color:#1A1A1A;line-height:1.5;}
.pdf-address-box{background:#F8F6F2;border-left:3px solid #B8922A;padding:10px 14px;border-radius:0 6px 6px 0;font-size:13px;margin-bottom:16px;}
.pdf-section-title{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#777;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid #E0E0E0;}
.pdf-table{width:100%;border-collapse:collapse;}
.pdf-table th{font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#777;padding:8px 10px;border-bottom:2px solid #E0E0E0;text-align:left;}
.pdf-table th:last-child,.pdf-table td:last-child{text-align:right;}
.pdf-table td{font-size:13px;padding:10px 10px;border-bottom:1px solid #F0F0F0;}
.pdf-tot-row{display:flex;justify-content:space-between;padding:6px 10px;font-size:13px;color:#555;border-top:1px solid #E0E0E0;}
.pdf-tot-grand{display:flex;justify-content:space-between;padding:10px 10px;font-size:16px;font-weight:700;background:#F8F6F2;border-top:2px solid #B8922A;margin-top:4px;}
.pdf-footer{margin-top:28px;padding-top:14px;border-top:1px solid #E0E0E0;display:flex;justify-content:space-between;font-size:11px;color:#AAA;}

</style>
</head>

<!-- RECORD PAYMENT MODAL -->
<div class="modal-overlay" id="payModal">
  <div class="modal">
    <div class="modal-header">
      <div style="font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:700;">Record payment</div>
      <button class="btn btn-ghost btn-sm" onclick="closeModal('payModal')">✕</button>
    </div>
    <div class="modal-body">
      <div id="payModalInfo" style="background:var(--surface2);border-radius:8px;padding:12px 14px;margin-bottom:16px;font-size:13px;color:var(--muted);"></div>
      <div class="form-grid-2">
        <div class="form-field">
          <label>Payment method</label>
          <select id="payMethod">
            <option value="card">Credit card</option>
            <option value="ach">ACH / bank transfer</option>
            <option value="check">Check</option>
            <option value="wire">Wire transfer</option>
            <option value="cash">Cash</option>
          </select>
        </div>
        <div class="form-field">
          <label>Amount received</label>
          <input type="number" id="payAmt" placeholder="0.00">
        </div>
      </div>
      <div class="form-grid-2">
        <div class="form-field">
          <label>Date received</label>
          <input type="date" id="payDate" value="2026-05-11">
        </div>
        <div class="form-field">
          <label>Reference / check #</label>
          <input type="text" id="payRef" placeholder="Optional">
        </div>
      </div>
      <div class="form-field">
        <label>Notes</label>
        <input type="text" placeholder="Optional notes">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost btn-sm" onclick="closeModal('payModal')">Cancel</button>
      <button class="btn btn-success" onclick="confirmPayment()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>

</div>

// ===== Connect to the shared data core (sdd-data.js) =====
// Build the working INVOICES list from the real invoices that live on each
// job in window.SDD, merging in the rich detail from INVOICES_SEED when the
// invoice number matches. Anything created/edited here is written back to SDD.
function _ivNum(v){ if(typeof v==='number') return v; var n=parseFloat(String(v||'').replace(/[^0-9.\-]/g,'')); return isNaN(n)?0:n; }
function _ivStatusFromSDD(s){
  var l=(s||'').toLowerCase();
  if(l==='paid') return 'paid';
  if(l==='partial') return 'partial';
  if(l==='past due'||l==='overdue') return 'overdue';
  if(l==='sent') return 'sent';
  if(l==='draft') return 'draft';
  if(l==='unpaid') return 'sent';
  return 'sent';
}
function buildInvoicesFromSDD(){
  if(!(window.SDD && window.SDD.customers)) return INVOICES_SEED.slice();
  var out=[];
  var nextId=1;
  window.SDD.customers.forEach(function(c){
    (c.contacts||[]).forEach(function(ct){
      (ct.jobs||[]).forEach(function(j){
        (j.invoices||[]).forEach(function(iv){
          var amt=_ivNum(iv.amount);
          // Try to find a matching detailed seed by invoice number
          var seed=INVOICES_SEED.filter(function(s){ return s.num===iv.est || s.est===iv.originalEst; })[0];
          var base = seed ? JSON.parse(JSON.stringify(seed)) : {
            lines:[{desc:(j.projectName||j.jobName||'Demolition services'),qty:'1',unit:'job',price:'$'+amt.toLocaleString(),total:'$'+amt.toLocaleString()}],
            payments:[], vendorBills:[], timeline:[{action:'Invoice created',date:iv.date||'',color:'#AAA'}],
            terms:'Net 30', waiver:'none', paymentMethod:'portal',
            billingContact:(ct.name||c.name), billingEmail:'billing@example.com',
            companyAddress:'4500 Main St, San Diego CA 92103'
          };
          base.id = nextId++;
          base.num = iv.est;
          base.est = iv.originalEst || base.est || '';
          base.customer = c.name;
          base.contact = ct.name || base.contact || '';
          base.jobName = j.projectName || j.jobName || base.jobName || '';
          base.jobAddress = j.address || base.jobAddress || '';
          base.status = _ivStatusFromSDD(iv.status);
          base.invoiceDate = iv.date || base.invoiceDate || '';
          base.dueDate = iv.due || base.dueDate || '';
          base.total = amt;
          if(base.subtotal==null) base.subtotal = amt;
          if(base.paid==null) base.paid = (base.status==='paid'?amt:(base.status==='partial'?Math.round(amt/2):0));
          base.balance = amt - (base.paid||0);
          base._sddRef = {custId:c.id, contactName:ct.name, est:j.est, invEst:iv.est};
          out.push(base);
        });
      });
    });
  });
  return out.length ? out : INVOICES_SEED.slice();
}
var INVOICES = buildInvoicesFromSDD();
// Persist a status/amount change back to the SDD invoice this row came from.
function syncInvoiceToSDD(inv){
  if(!(inv && inv._sddRef && window.SDD)) return;
  var ref=inv._sddRef;
  (window.SDD.customers||[]).forEach(function(c){
    if(c.id!==ref.custId) return;
    (c.contacts||[]).forEach(function(ct){
      (ct.jobs||[]).forEach(function(j){
        (j.invoices||[]).forEach(function(iv){
          if(iv.est===ref.invEst){
            var statusMap={paid:'Paid',partial:'Partial',overdue:'Past due',sent:'Sent',draft:'Draft'};
            iv.status = statusMap[inv.status] || iv.status;
          }
        });
      });
    });
  });
  if(window.SDD.save) window.SDD.save();
}

      <span id="ivchev-${key}" style="font-size:13px;color:var(--muted);transition:transform .15s;${openByDefault?'transform:rotate(90deg);':''}">▸</span>

function ivToggleSection(key){

}

function ivSave(id, field, val){
  const inv=INVOICES.find(i=>i.id===id);
  if(inv) inv[field]=val;
}
function parseMoneyIv(v){ if(typeof v==='number') return v; return parseFloat(String(v||'0').replace(/[$,]/g,''))||0; }
function ivLineSave(id, idx, field, val){
  const inv=INVOICES.find(i=>i.id===id);
  if(!inv||!inv.lines||!inv.lines[idx]) return;
  inv.lines[idx][field]=val;
  if(field==='qty'||field==='price'){
    const q=parseMoneyIv(inv.lines[idx].qty);
    const p=parseMoneyIv(inv.lines[idx].price);
    inv.lines[idx].total='$'+(q*p).toLocaleString('en-US');
    ivRecalcTotals(id);
    renderDetail();
  }
}
function ivRecalcTotals(id){
  const inv=INVOICES.find(i=>i.id===id);
  if(!inv) return;
  const sub=(inv.lines||[]).reduce((s,l)=>s+parseMoneyIv(l.total),0);
  inv.subtotal=sub;
  inv.total=sub+(inv.tax||0);
  inv.balance=inv.total-(inv.paid||0);
}
function ivDeleteLine(id, idx){
  const inv=INVOICES.find(i=>i.id===id);
  if(!inv||!inv.lines) return;
  inv.lines.splice(idx,1);
  ivRecalcTotals(id);
  renderDetail();
}
function ivSaveInvoice(id){
  ivRecalcTotals(id);
  renderDetail();
  if(typeof flash==='function') flash('✓ Invoice saved','#3A9E6A');
}

function ivCloseLineEditor(){ const el=document.getElementById('_ivLineEditBg'); if(el) el.remove(); }
function ivSaveLineEditor(){
  const inv=INVOICES.find(i=>i.id===_ivLineEdit.id);
  if(!inv||!inv.lines||!inv.lines[_ivLineEdit.idx]){ ivCloseLineEditor(); return; }
  const l=inv.lines[_ivLineEdit.idx];
  l.desc=(document.getElementById('_ivle_desc')||{value:''}).value;

function doSendInvoice(id){
  const inv = INVOICES.find(i=>i.id===id);
  if(!inv) return;
  inv.status = 'sent';
  inv.waiverSent = inv.waiver === 'conditional';
  inv.timeline.push({action:'Invoice sent to client', date: new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}), color:'#3A7ED4'});
  if(inv.waiverSent) inv.timeline.push({action:'Conditional waiver sent with invoice', date: new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}), color:'#C8822A'});
  inv.timeline.push({action:'Status → Sent · open · AR', date: new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}), color:'#3A7ED4'});
  renderList();
  renderDetail();

  document.getElementById('payModalInfo').innerHTML =
    `<strong>${inv.num}</strong> · ${inv.customer}<br>Balance due: <strong style="color:var(--danger);">${fmt(inv.balance)}</strong>`;
  document.getElementById('payAmt').value = inv.balance;

function confirmPayment(){
  const inv = INVOICES.find(i=>i.id===payTargetId);
  const amt = parseFloat(document.getElementById('payAmt').value)||0;
  const method = document.getElementById('payMethod').value;
  const date = document.getElementById('payDate').value;
  const ref = document.getElementById('payRef').value||'—';
  const methodLabels = {card:'Credit card',ach:'ACH transfer',check:'Check',wire:'Wire transfer',cash:'Cash'};
  const iconMap = {card:'pi-card',ach:'pi-ach',check:'pi-check',wire:'pi-ach',cash:'pi-check'};
  if(inv && amt>0){
    inv.paid += amt;
    inv.balance = Math.max(0, inv.balance - amt);
    inv.payments.push({method,label:methodLabels[method],amt,date:new Date(date+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}),ref,icon:iconMap[method]||'pi-card'});
    inv.timeline.push({action:`Payment received — ${fmt(amt)} (${methodLabels[method]})`,date:new Date(date+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}),color:'#3A9E6A'});
    if(inv.balance===0){
      inv.status='paid';
      inv.timeline.push({action:'Invoice marked paid in full',date:new Date(date+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}),color:'#3A9E6A'});
      // Waiver flow: if this invoice requires waivers and the unconditional hasn't been sent, flag it pending
      if((inv.waiver==='conditional'||inv.waiver==='unconditional'||inv.requiresWaivers) && !inv.unconditionalSent){
        inv.unconditionalPending=true;
        inv.timeline.push({action:'⚠ Unconditional waiver pending — send now that payment is received',date:new Date(date+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}),color:'#D94F4F'});
        setTimeout(function(){ if(typeof flash==='function') flash('⚠ '+inv.num+': payment received — unconditional waiver is now PENDING. Send it to close the job.','#D94F4F'); },150);
      }
    } else {
      inv.status='partial';
    }
  }
  closeModal('payModal');
  renderList();
  renderDetail();
}

var _sigCtx=null, _sigDrawing=false, _sigHasInk=false;
function _sigPadInit(){
  var c = document.getElementById('_sigCanvas');
  if(!c) return;
  // Scale canvas for crisp lines
  var rect = c.getBoundingClientRect();
  c.width = rect.width; c.height = rect.height;
  _sigCtx = c.getContext('2d');
  _sigCtx.lineWidth = 2.4; _sigCtx.lineCap='round'; _sigCtx.lineJoin='round'; _sigCtx.strokeStyle='#1a3a6b';
  _sigHasInk = false;
  function pos(e){
    var r=c.getBoundingClientRect();
    var p=(e.touches&&e.touches[0])?e.touches[0]:e;
    return {x:p.clientX-r.left, y:p.clientY-r.top};
  }
  function start(e){ e.preventDefault(); _sigDrawing=true; var pt=pos(e); _sigCtx.beginPath(); _sigCtx.moveTo(pt.x,pt.y); }
  function move(e){ if(!_sigDrawing)return; e.preventDefault(); var pt=pos(e); _sigCtx.lineTo(pt.x,pt.y); _sigCtx.stroke(); _sigHasInk=true; }
  function end(e){ _sigDrawing=false; }
  c.onmousedown=start; c.onmousemove=move; c.onmouseup=end; c.onmouseleave=end;
  c.ontouchstart=start; c.ontouchmove=move; c.ontouchend=end;
}
function sigPadClear(){
  var c=document.getElementById('_sigCanvas');
  if(c&&_sigCtx){ _sigCtx.clearRect(0,0,c.width,c.height); _sigHasInk=false; }
}
function sigPadSave(){

}

// ── AUTO-CREATE INVOICE FROM URL PARAMS ──
(function(){
  const params = new URLSearchParams(window.location.search);
  const estNum = params.get('create');
  if(!estNum) { selectInvoice(1); return; }

  // Build new draft invoice from estimate params
  const customer  = params.get('customer') || '';
  const amount    = parseFloat(params.get('amount')) || 0;
  const jobName   = params.get('job') || '';
  const poNumber  = params.get('po') || '';
  const tax       = Math.round(amount * 0.0875);
  const total     = amount + tax;
  const newId     = Math.max(...INVOICES.map(i=>i.id)) + 1;
  const invNum    = 'INV-' + String(newId).padStart(3,'0');

  const newInv = {
    id: newId,
    num: invNum,
    est: estNum,
    so: 'SO-' + estNum.replace('EST-',''),
    customer, contact: '',
    billingContact: 'Billing Contact',
    billingEmail: 'billing@client.com',
    jobAddress: jobName,
    companyAddress: '',
    jobName, poNumber,
    status: 'draft',
    invoiceDate: new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}),
    dueDate: new Date(Date.now()+30*24*60*60*1000).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}),
    subtotal: amount, tax, total,
    paid: 0, balance: total,
    terms: 'Net 30', waiver: 'conditional', waiverSent: false, unconditionalSent: false,
    paymentMethod: 'ach',
    lines:[
      {desc: jobName || 'Demolition services', qty:'1', unit:'job', price: '$'+amount.toLocaleString(), total: '$'+amount.toLocaleString()}
    ],
    payments:[],
    timeline:[
      {action:'Invoice created from estimate ' + estNum, date: new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}), color:'#AAA'},
      {action:'Status: Draft — review before sending', date: new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}), color:'#777'},
    ]
  };

  INVOICES.unshift(newInv);
  renderList();
  selectInvoice(newId);

  // Show a banner prompting user to review and send
  const banner = document.createElement('div');
  banner.style.cssText='position:fixed;top:64px;left:50%;transform:translateX(-50%);background:var(--gold);color:#fff;padding:12px 24px;border-radius:10px;font-size:14px;font-weight:600;z-index:9999;box-shadow:0 4px 20px rgba(0,0,0,.2);display:flex;align-items:center;gap:10px;max-width:520px;';
  banner.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>Invoice ${invNum} created as Draft — review and click <strong style="margin:0 4px;">Send Invoice</strong> when ready`;
  document.body.appendChild(banner);
  setTimeout(()=>banner.remove(), 6000);
})();
</script>

<script>
(function(){
  function killAutofill(root){
    var r=root||document;
    var inputs=r.querySelectorAll?r.querySelectorAll('input,textarea,select'):[];
    for(var i=0;i<inputs.length;i++){
      var el=inputs[i];
      if(el.getAttribute('data-naf')) continue;
      var type=(el.getAttribute('type')||'').toLowerCase();
      if(type==='checkbox'||type==='radio'||type==='file'||type==='hidden') continue;
      el.setAttribute('data-naf','1');
      el.setAttribute('autocomplete','new-password');
      el.setAttribute('autocorrect','off');
      el.setAttribute('autocapitalize','off');
      el.setAttribute('spellcheck','false');
      el.setAttribute('aria-autocomplete','none');
      if(!el.name || /^(name|email|phone|address|fname|lname|title|first|last)/i.test(el.name)){
        el.setAttribute('name','f_'+Math.random().toString(36).slice(2,9));
      }
    }
  }
  function start(){
    killAutofill(document);
    try{
      var obs=new MutationObserver(function(muts){
        for(var i=0;i<muts.length;i++){ var ad=muts[i].addedNodes; if(ad){ for(var j=0;j<ad.length;j++){ if(ad[j].nodeType===1) killAutofill(ad[j]); } } }
      });
      obs.observe(document.body,{childList:true,subtree:true});
    }catch(e){}
  }
  if(document.readyState==='loading'){ document.addEventListener('DOMContentLoaded', start); }
  else { start(); }
})();
</script>
